<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>世界さんかく鉄道 ＆ 全国制覇オタ活マップ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --color-unmarked: #f1f5f9; /* 未達成 */
            --color-stamp-bg: #fff1f2;  /* スタンプあり背景 */
            --color-primary: #ff4d94;   /* さんかく推し色 */
            --border-color: #cbd5e1;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-bottom: 5px;
            font-size: 26px;
            color: var(--color-primary);
            font-weight: bold;
        }

        .subtitle {
            font-size: 14px;
            margin-bottom: 20px;
            color: #64748b;
        }

        /* 配信画面対象エリア */
        #broadcast-area {
            background-color: #ffffff;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 1150px;
            max-width: 100%;
            box-sizing: border-box;
            border: 2px solid #e2e8f0;
            display: flex;
            gap: 25px;
        }

        /* 左側：リアル日本地図（ズーム・移動コンテナ） */
        .map-section {
            flex: 1.4;
            height: 600px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            background: #f8fafc;
            position: relative;
            overflow: hidden;
            cursor: grab;
        }
        .map-section:active {
            cursor: grabbing;
        }

        #map-container-inner {
            width: 100%;
            height: 100%;
            transform-origin: 0 0;
            position: absolute;
            top: 0;
            left: 0;
        }

        #japan-svg {
            width: 100%;
            height: 100%;
        }

        /* 精密な都道府県パスの基本スタイル */
        .pref {
            fill: var(--color-unmarked);
            stroke: #64748b;
            stroke-width: 0.3;
            cursor: pointer;
            transition: fill 0.15s ease;
        }
        .pref:hover {
            fill: #e2e8f0;
        }

        /* スタンプ数に応じた着色（徐々に濃く） */
        .s1 { fill: #ffe4e6 !important; }
        .s2 { fill: #fecdd3 !important; }
        .s3 { fill: #fda4af !important; }
        .s4 { fill: #fb7185 !important; }
        .s5 { fill: #f43f5e !important; }

        /* 地図上のスタンプ（🔺）スタイル */
        .map-stamp-text {
            font-size: 8px;
            font-weight: bold;
            fill: var(--color-primary);
            pointer-events: none;
            text-shadow: 0 0 3px #fff, 0 0 3px #fff;
        }

        /* 右側：情報エリア */
        .info-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: 600px;
        }

        .section-container {
            display: flex;
            flex-direction: column;
            height: 70%;
        }
        .section-container.short { height: 30%; }

        .section-title {
            font-size: 15px;
            color: #475569;
            margin: 0 0 8px 0;
            border-bottom: 2px solid var(--color-primary);
            padding-bottom: 4px;
            font-weight: bold;
        }

        .scroll-list {
            overflow-y: auto;
            flex: 1;
            padding-right: 5px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* リストアイテム */
        .area-item {
            background: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
            transition: all 0.15s;
        }
        .area-item:hover { border-color: #94a3b8; }
        .area-item.has-stamp { background-color: var(--color-stamp-bg); border-color: #fecdd3; }

        .area-name-text { font-weight: bold; font-size: 14px; }
        .shareholder-text { font-size: 12px; color: #64748b; margin-top: 2px;}
        .has-stamp .shareholder-text { color: var(--color-primary); font-weight: 500; }

        .stamp-badges {
            display: flex;
            gap: 2px;
            color: var(--color-primary);
            font-size: 14px;
        }

        /* 管理パネル */
        .control-panel {
            margin-top: 25px;
            background-color: #ffffff;
            padding: 20px;
            border-radius: 12px;
            width: 1150px;
            max-width: 100%;
            box-sizing: border-box;
            border: 1px solid #e2e8f0;
        }

        .mode-selector {
            margin-bottom: 15px;
            background: #f1f5f9;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn {
            background-color: #64748b;
            color: white;
            border: none;
            padding: 10px 18px;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 5px;
            font-weight: bold;
        }
        .btn:hover { background-color: #475569; }
        .btn.active { background-color: var(--color-primary); }
        .btn-primary { background-color: #2563eb; }
        .btn-primary:hover { background-color: #1d4ed8; }
        .btn-danger { background-color: #ef4444; }

        .hint { font-size: 12px; color: #64748b; margin-top: 10px; margin-bottom: 0; }
    </style>
</head>
<body>

        <div class="info-section">

                <h3 class="section-title" id="list-title">🗾 スタンプラリー状況</h3>

                    </div>
            </div>

            <div class="section-container short" style="height: 35%;">
                <h3 class="section-title">✈️ 海外・特別運行エリア</h3>

                    </div>

    <div class="control-panel">
        <h3 style="margin:0 0 10px 0; color:var(--color-primary); font-size:16px;">🛠️ 配信用管理パネル</h3>
        
        <div class="mode-selector">
            <strong>【モード切替】: </strong>
            <button class="btn active" id="mode-pref-btn" onclick="switchMode('pref')">47都道府県モード</button>
            <button class="btn" id="mode-region-btn" onclick="switchMode('region')">地方(9エリア)モード</button>
        </div>

        <button class="btn btn-primary" onclick="downloadMapImage()">現在のマップを画像として保存(DL)</button>
        <button class="btn" onclick="resetZoomAndPan()">ズーム・位置をリセット</button>
        <button class="btn" onclick="addOverseasArea()">海外エリアを新規追加</button>
        <button class="btn btn-danger" onclick="resetMapData()">全データをリセット</button>
        <p class="hint">※スクロールによるズームは地図の四角い枠内でのみ有効です。配信時はこの管理パネルをOBS側でクロップして隠してください。</p>
    </div>

    <script>
        // マップ設定データ
        const prefList = [
            { id: "hokkaido", name: "北海道", region: "hokkaido" },
            { id: "aomori", name: "青森県", region: "tohoku" }, { id: "iwate", name: "岩手県", region: "tohoku" },
            { id: "miyagi", name: "宮城県", region: "tohoku" }, { id: "akita", name: "秋田県", region: "tohoku" },
            { id: "yamagata", name: "山形県", region: "tohoku" }, { id: "fukushima", name: "福島県", region: "tohoku" },
            { id: "ibaraki", name: "茨城県", region: "kanto" }, { id: "tochigi", name: "栃木県", region: "kanto" },
            { id: "gunma", name: "群馬県", region: "kanto" }, { id: "saitama", name: "埼玉県", region: "kanto" },
            { id: "chiba", name: "千葉県", region: "kanto" }, { id: "tokyo", name: "東京都", region: "kanto" },
            { id: "kanagawa", name: "神奈川県", region: "kanto" },
            { id: "niigata", name: "新潟県", region: "chubu" }, { id: "toyama", name: "富山県", region: "chubu" },
            { id: "ishikawa", name: "石川県", region: "chubu" }, { id: "fukui", name: "福井県", region: "chubu" },
            { id: "yamanashi", name: "山梨県", region: "chubu" }, { id: "nagano", name: "長野県", region: "chubu" },
            { id: "gifu", name: "岐阜県", region: "chubu" }, { id: "shizuoka", name: "静岡県", region: "chubu" },
            { id: "aichi", name: "愛知県", region: "chubu" },
            { id: "mie", name: "三重県", region: "kansai" }, { id: "shiga", name: "滋賀県", region: "kansai" },
            { id: "kyoto", name: "京都府", region: "kansai" }, { id: "osaka", name: "大阪府", region: "kansai" },
            { id: "hyogo", name: "兵庫県", region: "kansai" }, { id: "nara", name: "奈良県", region: "kansai" },
            { id: "wakayama", name: "和歌山県", region: "kansai" },
            { id: "tottori", name: "鳥取県", region: "chugoku" }, { id: "shimane", name: "島根県", region: "chugoku" },
            { id: "okayama", name: "岡山県", region: "chugoku" }, { id: "hiroshima", name: "広島県", region: "chugoku" },
            { id: "yamaguchi", name: "山口県", region: "chugoku" },
            { id: "tokushima", name: "徳島県", region: "shikoku" }, { id: "kagawa", name: "香川県", region: "shikoku" },
            { id: "ehime", name: "愛媛県", region: "shikoku" }, { id: "kochi", name: "高知県", region: "shikoku" },
            { id: "fukuoka", name: "福岡県", region: "kyushu" }, { id: "saga", name: "佐賀県", region: "kyushu" },
            { id: "nagasaki", name: "長崎県", region: "kyushu" }, { id: "kumamoto", name: "熊本県", region: "kyushu" },
            { id: "oita", name: "大分県", region: "kyushu" }, { id: "miyazaki", name: "宮崎県", region: "kyushu" },
            { id: "kagoshima", name: "鹿児島県", region: "kyushu" }, { id: "okinawa", name: "沖縄県", region: "kyushu" }
        ];

        const regionList = [
            { id: "hokkaido", name: "北海道エリア" }, { id: "tohoku", name: "東北エリア" },
            { id: "kanto", name: "関東エリア" }, { id: "chubu", name: "中部エリア" },
            { id: "kansai", name: "関西エリア" }, { id: "chugoku", name: "中国エリア" },
            { id: "shikoku", name: "四国エリア" }, { id: "kyushu", name: "九州・沖縄エリア" }
        ];

        // 状態データオブジェクト
        let currentMode = "pref"; // 'pref' or 'region'
        let store = {
            pref: {},
            region: {},
            overseas: [{ id: "vietnam", name: "ベトナムエリア", count: 0, shareholder: "ー" }]
        };

        // 初期化
        prefList.forEach(p => { store.pref[p.id] = { count: 0, shareholder: "ー" }; });
        regionList.forEach(r => { store.region[r.id] = { count: 0, shareholder: "ー" }; });

        // ズーム・ドラッグ移動用変数
        let scale = 1, posX = 0, posY = 0, isDragging = false, startX, startY;
        const mapWindow = document.getElementById('map-section-window');
        const mapInner = document.getElementById('map-container-inner');

        window.onload = function() {
            // データ復元
            const saved = localStorage.getItem('sankaku_perfect_map_data');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    if(parsed.pref) store = parsed;
                    if(parsed.currentMode) currentMode = parsed.currentMode;
                } catch(e){ console.error(e); }
            }
            setupZoomAndPan();
            switchMode(currentMode);
        };

        function saveData() {
            store.currentMode = currentMode;
            localStorage.setItem('sankaku_perfect_map_data', JSON.stringify(store));
        }

        // ズーム＆ドラッグの仕組み
        function setupZoomAndPan() {
            mapWindow.addEventListener('wheel', function(e) {
                e.preventDefault();
                const zoomFactor = 0.1;
                if (e.deltaY < 0) { scale += zoomFactor; } else { scale -= zoomFactor; }
                scale = Math.min(Math.max(0.5, scale), 8); // 拡大制限
                updateTransform();
            }, { passive: false });

            mapWindow.addEventListener('mousedown', function(e) {
                if(e.button !== 0) return; // 左クリックのみ
                isDragging = true;
                startX = e.clientX - posX;
                startY = e.clientY - posY;
            });

            window.addEventListener('mousemove', function(e) {
                if (!isDragging) return;
                posX = e.clientX - startX;
                posY = e.clientY - startY;
                updateTransform();
            });

            window.addEventListener('mouseup', () => { isDragging = false; });
        }

        function updateTransform() {
            mapInner.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
        }

        function resetZoomAndPan() {
            scale = 1; posX = 0; posY = 0;
            updateTransform();
        }

        // モード切り替え機能
        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('mode-pref-btn').className = `btn ${mode==='pref'?'active':''}`;
            document.getElementById('mode-region-btn').className = `btn ${mode==='region'?'active':''}`;
            document.getElementById('list-title').textContent = mode === 'pref' ? "🗾 47都道府県スタンプラリー" : "🗾 地方広域エリアラリー";
            saveData();
            render();
        }

        // クリックイベントの処理
        function handleAreaClick(targetId, regionId) {
            const dataObj = currentMode === 'pref' ? store.pref[targetId] : store.region[regionId];
            dataObj.count = (dataObj.count + 1) % 6; // 0~5でループ
            saveData();
            render();
        }

        function handleAreaRightClick(targetId, regionId, name) {
            const dataObj = currentMode === 'pref' ? store.pref[targetId] : store.region[regionId];
            const displayTitle = currentMode === 'pref' ? name : regionList.find(r=>r.id===regionId).name;
            const newName = prompt(`「${displayTitle}」の筆頭株主名を入力:`, dataObj.shareholder);
            if (newName !== null) {
                dataObj.shareholder = newName.trim() === "" ? "ー" : newName;
                saveData();
                render();
            }
        }

        // レンダリング処理
        function render() {
            const mainList = document.getElementById('main-data-list');
            const overseasList = document.getElementById('overseas-list');
            const stampLayer = document.getElementById('stamp-layer');
            
            mainList.innerHTML = '';
            overseasList.innerHTML = '';
            stampLayer.innerHTML = '';

            // 全地図パスの色を一旦クリア
            document.querySelectorAll('.pref').forEach(path => {
                path.className.baseVal = "pref";
                
                const prefId = path.getAttribute('data-pref');
                const regionId = path.getAttribute('data-region');
                const prefName = prefList.find(p => p.id === prefId).name;

                // 地図クリックイベントの紐付け
                path.onclick = () => handleAreaClick(prefId, regionId);
                path.oncontextmenu = (e) => { e.preventDefault(); handleAreaRightClick(prefId, regionId, prefName); };

                // 現在のモードに応じた着色
                const currentCount = currentMode === 'pref' ? store.pref[prefId].count : store.region[regionId].count;
                if(currentCount > 0) {
                    path.classList.add(`s${currentCount}`);
                }
            });

            // リストの生成と地図上への🔺スタンプ配置
            if (currentMode === 'pref') {
                prefList.forEach(p => {
                    const data = store.pref[p.id];
                    mainList.appendChild(createListRow(p.name, data, () => handleAreaClick(p.id, p.region), () => handleAreaRightClick(p.id, p.region, p.name)));
                    if(data.count > 0) drawStampOnMap(p.id, data.count);
                });
            } else {
                regionList.forEach(r => {
                    const data = store.region[r.id];
                    mainList.appendChild(createListRow(r.name, data, () => handleAreaClick(null, r.id), () => handleAreaRightClick(null, r.id, null)));
                    
                    // 地方モードの時はその地方に属するすべての県パスの中心に1つスタンプを表示
                    if(data.count > 0) {
                        const firstPrefOfRegion = prefList.find(p => p.region === r.id).id;
                        drawStampOnMap(firstPrefOfRegion, data.count);
                    }
                });
            }

            // 海外リストの更新
            store.overseas.forEach(ov => {
                const row = document.createElement('div');
                row.className = `area-item ${ov.count > 0 ? 'has-stamp' : ''}`;
                row.innerHTML = `<div><div class="area-name-text">${ov.name}</div><div class="shareholder-text">株主: ${ov.shareholder}</div></div><div class="stamp-badges">${ov.count > 0 ? "🔺".repeat(ov.count) : "未出発"}</div>`;
                row.onclick = () => { ov.count = (ov.count + 1) % 6; saveData(); render(); };
                row.oncontextmenu = (e) => {
                    e.preventDefault();
                    const n = prompt(`「${ov.name}」の筆頭株主名:`, ov.shareholder);
                    if(n !== null){ ov.shareholder = n.trim()===""?"ー":n; saveData(); render(); }
                };
                overseasList.appendChild(row);
            });
        }

        function createListRow(name, data, clickFn, rightClickFn) {
            const row = document.createElement('div');
            row.className = `area-item ${data.count > 0 ? 'has-stamp' : ''}`;
            row.innerHTML = `<div><div class="area-name-text">${name}</div><div class="shareholder-text">株主: ${data.shareholder}</div></div><div class="stamp-badges">${data.count > 0 ? "🔺".repeat(data.count) : "未出発"}</div>`;
            row.onclick = clickFn;
            row.oncontextmenu = (e) => { e.preventDefault(); rightClickFn(); };
            return row;
        }

        function drawStampOnMap(prefId, count) {
            const path = document.getElementById(`pref_${prefId}`);
            if(!path) return;
            const bbox = path.getBBox();
            const cx = bbox.x + bbox.width / 2;
            const cy = bbox.y + bbox.height / 2;

            const textNode = document.createElementNS("http://www.w3.org/2000/svg", "text");
            textNode.setAttribute("x", cx - (count * 3.5));
            textNode.setAttribute("y", cy + 3);
            textNode.setAttribute("class", "map-stamp-text");
            textNode.textContent = "🔺".repeat(count);
            document.getElementById('stamp-layer').appendChild(textNode);
        }

        function addOverseasArea() {
            const name = prompt("海外・特別エリア名を入力してください（例: タイエリア）:");
            if (name && name.trim() !== "") {
                store.overseas.push({ id: "custom_" + Date.now(), name: name.trim(), count: 0, shareholder: "ー" });
                saveData(); render();
            }
        }

        function resetMapData() {
            if (confirm("本当に【すべてのモードのスタンプ・株主データ】を初期化しますか？")) {
                localStorage.removeItem('sankaku_perfect_map_data');
                prefList.forEach(p => { store.pref[p.id] = { count: 0, shareholder: "ー" }; });
                regionList.forEach(r => { store.region[r.id] = { count: 0, shareholder: "ー" }; });
                store.overseas = [{ id: "vietnam", name: "ベトナムエリア", count: 0, shareholder: "ー" }];
                resetZoomAndPan(); switchMode("pref");
            }
        }

        function downloadMapImage() {
            resetZoomAndPan();
            setTimeout(() => {
                const target = document.getElementById('broadcast-area');
                html2canvas(target, { backgroundColor: '#ffffff', scale: 2 }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `さんかく鉄道_配信マップ_${new Date().toISOString().slice(0,10)}.png`;
                    link.href = canvas.toDataURL(); link.click();
                });
            }, 200);
        }
    </script>
</body>
</html>
