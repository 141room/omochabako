<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>世界さんかく鉄道 ＆ 全国制覇オタ活マップ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --color-unmarked: #f1f5f9; /* 未達成 */
            --color-stamp-bg: #fff1f2;  /* スタンプあり背景 */
            --color-primary: #ff4d94;   /* さんかく推し色 */
            --border-color: #cbd5e1;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-bottom: 5px;
            font-size: 26px;
            color: var(--color-primary);
            font-weight: bold;
        }

        .subtitle {
            font-size: 14px;
            margin-bottom: 20px;
            color: #64748b;
        }

        /* 配信画面対象エリア */
        #broadcast-area {
            background-color: #ffffff;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 1200px;
            max-width: 100%;
            box-sizing: border-box;
            border: 2px solid #e2e8f0;
            display: flex;
            gap: 25px;
        }

        /* 左側：日本地図表示コンテナ（ズーム・移動） */
        .map-section {
            flex: 1.3;
            height: 620px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            background: #ffffff;
            position: relative;
            overflow: hidden;
            cursor: grab;
        }
        .map-section:active {
            cursor: grabbing;
        }

        #map-container-inner {
            width: 100%;
            height: 100%;
            transform-origin: 0 0;
            position: absolute;
            top: 0;
            left: 0;
        }

        #japan-svg {
            width: 100%;
            height: 100%;
        }

        /* 都道府県パスのスタイル */
        .jmap-pref {
            fill: var(--color-unmarked);
            stroke: #64748b;
            stroke-width: 0.5;
            cursor: pointer;
            transition: fill 0.15s ease;
        }
        .jmap-pref:hover {
            opacity: 0.8;
        }

        /* 右側：データ管理・パレットエリア */
        .info-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            height: 620px;
        }

        .section-container {
            display: flex;
            flex-direction: column;
            height: 45%;
        }
        .section-container.short { height: 25%; }
        .section-container.palette-box { height: 30%; }

        .section-title {
            font-size: 14px;
            color: #475569;
            margin: 0 0 8px 0;
            border-bottom: 2px solid var(--color-primary);
            padding-bottom: 4px;
            font-weight: bold;
        }

        .scroll-list {
            overflow-y: auto;
            flex: 1;
            padding-right: 5px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        /* リストアイテム */
        .area-item {
            background: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 6px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
            transition: all 0.15s;
        }
        .area-item:hover { border-color: #94a3b8; }

        .area-name-text { font-weight: bold; font-size: 13px; }
        .shareholder-text { font-size: 11px; color: #64748b; margin-top: 1px;}

        .stamp-badges {
            display: flex;
            gap: 2px;
            color: var(--color-primary);
            font-size: 12px;
        }

        /* 🎨 カラーパレットシステム */
        .palette-wrapper {
            background: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .current-color-bar {
            height: 24px;
            border-radius: 4px;
            border: 1px solid #94a3b8;
            background-color: #0000ff; /* デフォルト初期色：青 */
            transition: background-color 0.15s;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
        }

        .color-cell {
            aspect-ratio: 1.5;
            border-radius: 4px;
            border: 1px solid #cbd5e1;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .color-cell:hover {
            transform: scale(1.08);
            border-color: #475569;
        }
        .color-cell.selected {
            border: 2px solid #000000;
            box-shadow: 0 0 4px rgba(0,0,0,0.3);
        }

        /* 管理パネル */
        .control-panel {
            margin-top: 25px;
            background-color: #ffffff;
            padding: 20px;
            border-radius: 12px;
            width: 1200px;
            max-width: 100%;
            box-sizing: border-box;
            border: 1px solid #e2e8f0;
        }

        .mode-selector {
            margin-bottom: 15px;
            background: #f1f5f9;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn {
            background-color: #64748b;
            color: white;
            border: none;
            padding: 10px 18px;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 5px;
            font-weight: bold;
        }
        .btn:hover { background-color: #475569; }
        .btn.active { background-color: var(--color-primary); }
        .btn-paint { background-color: #059669; }
        .btn-paint:hover { background-color: #047857; }
        .btn-primary { background-color: #2563eb; }
        .btn-primary:hover { background-color: #1d4ed8; }
        .btn-danger { background-color: #ef4444; }

        .hint { font-size: 12px; color: #64748b; margin-top: 10px; margin-bottom: 0; }
    </style>
</head>
<body>

        <div class="info-section">
            <div class="section-container">
                <h3 class="section-title" id="list-title">🗾 スタンプラリー状況</h3>
                <div class="scroll-list" id="main-data-list">
                    </div>
            </div>

            <div class="section-container short">
                <h3 class="section-title">✈️ 海外・特別運行エリア</h3>
                <div class="scroll-list" id="overseas-list">
                    </div>
            </div>

            <div class="section-container palette-box">
                <h3 class="section-title">🎨 カラーパレット（色塗りモード用）</h3>
                <div class="palette-wrapper">
                    <div class="current-color-bar" id="color-preview"></div>
                    <div class="color-grid" id="color-palette-grid">
                        </div>

    </div>

    <div class="control-panel">
        <h3 style="margin:0 0 10px 0; color:var(--color-primary); font-size:16px;">🛠️ 配信用管理パネル</h3>
        
        <div class="mode-selector">
            <strong>【現在のモード】: </strong>
            <button class="btn active" id="mode-pref-btn" onclick="switchMode('pref')">47都道府県スタンプ</button>
            <button class="btn" id="mode-region-btn" onclick="switchMode('region')">地方(9エリア)スタンプ</button>
            <button class="btn btn-paint" id="mode-paint-btn" onclick="switchMode('paint')">🎨 自由色塗りモード</button>
        </div>

        <button class="btn btn-primary" onclick="downloadMapImage()">現在のマップを画像として保存(DL)</button>
        <button class="btn" onclick="resetZoomAndPan()">ズーム・位置をリセット</button>
        <button class="btn" onclick="addOverseasArea()">海外エリアを新規追加</button>
        <button class="btn btn-danger" onclick="resetMapData()">全データをリセット</button>
    </div>

    <script>
        const prefList = [
            { id: "hokkaido", name: "北海道", region: "hokkaido" },
            { id: "aomori", name: "青森県", region: "tohoku" }, { id: "iwate", name: "岩手県", region: "tohoku" },
            { id: "miyagi", name: "宮城県", region: "tohoku" }, { id: "akita", name: "秋田県", region: "tohoku" },
            { id: "yamagata", name: "山形県", region: "tohoku" }, { id: "fukushima", name: "福島県", region: "tohoku" },
            { id: "ibaraki", name: "茨城県", region: "kanto" }, { id: "tochigi", name: "栃木県", region: "kanto" },
            { id: "gunma", name: "群馬県", region: "kanto" }, { id: "saitama", name: "埼玉県", region: "kanto" },
            { id: "chiba", name: "千葉県", region: "kanto" }, { id: "tokyo", name: "東京都", region: "kanto" },
            { id: "kanagawa", name: "神奈川県", region: "kanto" },
            { id: "niigata", name: "新潟県", region: "chubu" }, { id: "toyama", name: "富山県", region: "chubu" },
            { id: "ishikawa", name: "石川県", region: "chubu" }, { id: "fukui", name: "福井県", region: "chubu" },
            { id: "yamanashi", name: "山梨県", region: "chubu" }, { id: "nagano", name: "長野県", region: "chubu" },
            { id: "gifu", name: "岐阜県", region: "chubu" }, { id: "shizuoka", name: "静岡県", region: "chubu" },
            { id: "aichi", name: "愛知県", region: "chubu" },
            { id: "mie", name: "三重県", region: "kansai" }, { id: "shiga", name: "滋賀県", region: "kansai" },
            { id: "kyoto", name: "京都府", region: "kansai" }, { id: "osaka", name: "大阪府", region: "kansai" },
            { id: "hyogo", name: "兵庫県", region: "kansai" }, { id: "nara", name: "奈良県", region: "kansai" },
            { id: "wakayama", name: "和歌山県", region: "kansai" },
            { id: "tottori", name: "鳥取県", region: "chugoku" }, { id: "shimane", name: "島根県", region: "chugoku" },
            { id: "okayama", name: "岡山県", region: "chugoku" }, { id: "hiroshima", name: "広島県", region: "chugoku" },
            { id: "yamaguchi", name: "山口県", region: "chugoku" },
            { id: "tokushima", name: "徳島県", region: "shikoku" }, { id: "kagawa", name: "香川県", region: "shikoku" },
            { id: "ehime", name: "愛媛県", region: "shikoku" }, { id: "kochi", name: "高知県", region: "shikoku" },
            { id: "fukuoka", name: "福岡県", region: "kyushu" }, { id: "saga", name: "佐賀県", region: "kyushu" },
            { id: "nagasaki", name: "長崎県", region: "kyushu" }, { id: "kumamoto", name: "熊本県", region: "kyushu" },
            { id: "oita", name: "大分県", region: "kyushu" }, { id: "miyazaki", name: "宮崎県", region: "kyushu" },
            { id: "kagoshima", name: "鹿児島県", region: "kyushu" }, { id: "okinawa", name: "沖縄県", region: "kyushu" }
        ];

        const regionList = [
            { id: "hokkaido", name: "北海道エリア" }, { id: "tohoku", name: "東北エリア" },
            { id: "kanto", name: "関東エリア" }, { id: "chubu", name: "中部エリア" },
            { id: "kansai", name: "関西エリア" }, { id: "chugoku", name: "中国エリア" },
            { id: "shikoku", name: "四国エリア" }, { id: "kyushu", name: "九州・沖縄エリア" }
        ];

        const paletteColors = [
            "#000000", "#808080", "#c0c0c0", "#ffffff", "#800000",
            "#ff0000", "#800080", "#ff00ff", "#008000", "#00ff00",
            "#808000", "#ffff00", "#000080", "#0000ff", "#008080"
        ];

        let currentMode = "pref"; 
        let selectedColor = "#0000ff"; // 初期選択色（青）

        let store = {
            pref: {}, region: {}, paintColors: {},
            overseas: [{ id: "vietnam", name: "ベトナムエリア", count: 0, shareholder: "ー", color: "" }]
        };

        // 初期化
        prefList.forEach(p => { store.pref[p.id] = { count: 0, shareholder: "ー" }; store.paintColors[p.id] = ""; });
        regionList.forEach(r => { store.region[r.id] = { count: 0, shareholder: "ー" }; });

        let scale = 1, posX = 0, posY = 0, isDragging = false, startX, startY;
        const mapWindow = document.getElementById('map-section-window');
        const mapInner = document.getElementById('map-container-inner');

        window.onload = function() {
            const saved = localStorage.getItem('sankaku_final_inline_data');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    if(parsed.pref) store = parsed;
                    if(parsed.currentMode) currentMode = parsed.currentMode;
                    if(parsed.selectedColor) selectedColor = parsed.selectedColor;
                } catch(e){ console.error(e); }
            }
            createPaletteGrid();
            setupZoomAndPan();
            setupSvgClicks();
            switchMode(currentMode);
        };

        function saveData() {
            store.currentMode = currentMode;
            store.selectedColor = selectedColor;
            localStorage.setItem('sankaku_final_inline_data', JSON.stringify(store));
        }

        function createPaletteGrid() {
            const grid = document.getElementById('color-palette-grid');
            const preview = document.getElementById('color-preview');
            preview.style.backgroundColor = selectedColor;

            paletteColors.forEach(color => {
                const cell = document.createElement('div');
                cell.className = 'color-cell';
                cell.style.backgroundColor = color;
                if(color === selectedColor) cell.classList.add('selected');

                cell.onclick = () => {
                    document.querySelectorAll('.color-cell').forEach(c => c.classList.remove('selected'));
                    cell.classList.add('selected');
                    selectedColor = color;
                    preview.style.backgroundColor = color;
                    saveData();
                };
                grid.appendChild(cell);
            });
        }

        function setupZoomAndPan() {
            mapWindow.addEventListener('wheel', function(e) {
                e.preventDefault();
                const zoomFactor = 0.1;
                if (e.deltaY < 0) { scale += zoomFactor; } else { scale -= zoomFactor; }
                scale = Math.min(Math.max(0.4, scale), 8);
                updateTransform();
            }, { passive: false });

            mapWindow.addEventListener('mousedown', function(e) {
                if(e.button !== 0) return;
                isDragging = true;
                startX = e.clientX - posX;
                startY = e.clientY - posY;
            });

            window.addEventListener('mousemove', function(e) {
                if (!isDragging) return;
                posX = e.clientX - startX;
                posY = e.clientY - startY;
                updateTransform();
            });

            window.addEventListener('mouseup', () => { isDragging = false; });
        }

        function updateTransform() {
            mapInner.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
        }

        function resetZoomAndPan() {
            scale = 1; posX = 0; posY = 0;
            updateTransform();
        }

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('mode-pref-btn').className = `btn ${mode==='pref'?'active':''}`;
            document.getElementById('mode-region-btn').className = `btn ${mode==='region'?'active':''}`;
            document.getElementById('mode-paint-btn').className = `btn btn-paint ${mode==='paint'?'active':''}`;
            
            const titleEl = document.getElementById('list-title');
            if(mode === 'pref') titleEl.textContent = "🗾 47都道府県スタンプラリー";
            if(mode === 'region') titleEl.textContent = "🗾 地方広域エリアラリー";
            if(mode === 'paint') titleEl.textContent = "🎨 都道府県リスト (色塗り連動中)";
            
            saveData();
            render();
        }

        function setupSvgClicks() {
            document.querySelectorAll('.jmap-pref').forEach(path => {
                const prefId = path.getAttribute('data-id');
                const regionId = path.getAttribute('data-region');

                path.onclick = (e) => {
                    e.stopPropagation();
                    handleAreaClick(prefId, regionId);
                };

                path.oncontextmenu = (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    const pName = prefList.find(p => p.id === prefId).name;
                    handleAreaRightClick(prefId, regionId, pName);
                };
            });
        }

        function handleAreaClick(prefId, regionId) {
            if (currentMode === 'paint') {
                store.paintColors[prefId] = store.paintColors[prefId] === selectedColor ? "" : selectedColor;
            } else if (currentMode === 'pref') {
                store.pref[prefId].count = (store.pref[prefId].count + 1) % 6;
            } else if (currentMode === 'region') {
                store.region[regionId].count = (store.region[regionId].count + 1) % 6;
            }
            saveData();
            render();
        }

        function handleAreaRightClick(prefId, regionId, name) {
            const dataObj = (currentMode === 'region') ? store.region[regionId] : store.pref[prefId];
            const displayTitle = (currentMode === 'region') ? regionList.find(r=>r.id===regionId).name : name;
            const newName = prompt(`「${displayTitle}」の筆頭株主名を入力:`, dataObj.shareholder);
            if (newName !== null) {
                dataObj.shareholder = newName.trim() === "" ? "ー" : newName;
                saveData();
                render();
            }
        }

        function render() {
            const mainList = document.getElementById('main-data-list');
            const overseasList = document.getElementById('overseas-list');
            
            mainList.innerHTML = '';
            overseasList.innerHTML = '';

            const stampColors = ["#f1f5f9", "#ffe4e6", "#fecdd3", "#fda4af", "#fb7185", "#f43f5e"];

            // 1. 地図の着色を同期
            prefList.forEach(p => {
                const path = document.querySelector(`[data-id="${p.id}"]`);
                if (path) {
                    if (currentMode === 'paint') {
                        path.style.fill = store.paintColors[p.id] || "#f1f5f9";
                    } else {
                        const count = currentMode === 'pref' ? store.pref[p.id].count : store.region[p.region].count;
                        path.style.fill = stampColors[count];
                    }
                }
            });

            // 2. 右側リストの更新
            if (currentMode === 'pref' || currentMode === 'paint') {
                prefList.forEach(p => {
                    const data = store.pref[p.id];
                    const row = createListRow(p.name, data, () => handleAreaClick(p.id, p.region), () => handleAreaRightClick(p.id, p.region, p.name));
                    if (currentMode === 'paint' && store.paintColors[p.id]) {
                        row.style.borderLeft = `5px solid ${store.paintColors[p.id]}`;
                    }
                    mainList.appendChild(row);
                });
            } else {
                regionList.forEach(r => {
                    const data = store.region[r.id];
                    mainList.appendChild(createListRow(r.name, data, () => handleAreaClick(null, r.id), () => handleAreaRightClick(null, r.id, null)));
                });
            }

            // 海外エリアリストの更新
            store.overseas.forEach(ov => {
                const row = document.createElement('div');
                row.className = `area-item`;
                if(ov.count > 0 && currentMode !== 'paint') row.style.backgroundColor = "var(--color-stamp-bg)";
                if(ov.color) row.style.borderLeft = `5px solid ${ov.color}`;

                row.innerHTML = `<div><div class="area-name-text">${ov.name}</div><div class="shareholder-text">株主: ${ov.shareholder}</div></div><div class="stamp-badges">${(ov.count > 0 && currentMode !== 'paint') ? "🔺".repeat(ov.count) : ""}</div>`;
                
                row.onclick = () => {
                    if (currentMode === 'paint') {
                        ov.color = ov.color === selectedColor ? "" : selectedColor;
                    } else {
                        ov.count = (ov.count + 1) % 6;
                    }
                    saveData(); render();
                };
                row.oncontextmenu = (e) => {
                    e.preventDefault();
                    const n = prompt(`「${ov.name}」の筆頭株主名:`, ov.shareholder);
                    if(n !== null){ ov.shareholder = n.trim()===""?"ー":n; saveData(); render(); }
                };
                overseasList.appendChild(row);
            });
        }

        function createListRow(name, data, clickFn, rightClickFn) {
            const row = document.createElement('div');
            row.className = `area-item`;
            if (data.count > 0 && currentMode !== 'paint') row.style.backgroundColor = "var(--color-stamp-bg)";
            
            row.innerHTML = `<div><div class="area-name-text">${name}</div><div class="shareholder-text">株主: ${data.shareholder}</div></div><div class="stamp-badges">${(data.count > 0 && currentMode !== 'paint') ? "🔺".repeat(data.count) : ""}</div>`;
            row.onclick = clickFn;
            row.oncontextmenu = (e) => { e.preventDefault(); rightClickFn(); };
            return row;
        }

        function addOverseasArea() {
            const name = prompt("海外・特別エリア名を入力してください:");
            if (name && name.trim() !== "") {
                store.overseas.push({ id: "custom_" + Date.now(), name: name.trim(), count: 0, shareholder: "ー", color: "" });
                saveData(); render();
            }
        }

        function resetMapData() {
            if (confirm("本当に【全データをリセット】して初期化しますか？")) {
                localStorage.removeItem('sankaku_final_inline_data');
                prefList.forEach(p => { store.pref[p.id] = { count: 0, shareholder: "ー" }; store.paintColors[p.id] = ""; });
                regionList.forEach(r => { store.region[r.id] = { count: 0, shareholder: "ー" }; });
                store.overseas = [{ id: "vietnam", name: "ベトナムエリア", count: 0, shareholder: "ー", color: "" }];
                resetZoomAndPan(); switchMode("pref");
            }
        }

        function downloadMapImage() {
            resetZoomAndPan();
            alert("進捗画像を生成します。少々お待ちください。");
            setTimeout(() => {
                const target = document.getElementById('broadcast-area');
                html2canvas(target, { backgroundColor: '#ffffff', scale: 2 }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `さんかく鉄道_配信進捗_${new Date().toISOString().slice(0,10)}.png`;
                    link.href = canvas.toDataURL(); link.click();
                });
            }, 500);
        }
    </script>
</body>
</html>
