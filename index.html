<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>世界さんかく鉄道 ＆ 全国制覇オタ活マップ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <script src="mapdata.js"></script>
    <script src="countrymap.js"></script>

    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --color-unmarked: #88a4bc; /* 未達成（SimpleMaps仕様の美しいブルーグレー） */
            --color-stamp-bg: #fff1f2;  
            --color-primary: #ff4d94;   
            --border-color: #cbd5e1;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-bottom: 5px;
            font-size: 26px;
            color: var(--color-primary);
            font-weight: bold;
        }

        .subtitle {
            font-size: 14px;
            margin-bottom: 20px;
            color: #64748b;
        }

        #broadcast-area {
            background-color: #ffffff;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 1250px;
            max-width: 100%;
            box-sizing: border-box;
            border: 2px solid #e2e8f0;
            display: flex;
            gap: 25px;
        }

        /* 左側：リアル日本地図表示コンテナ */
        .map-section {
            box-sizing: border-box;
            flex: 1.3;
            height: 620px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            background: #ffffff;
            position: relative;
            overflow: hidden;
        }

        /* 外部JSによって自動展開されるコンテナスタイルを固定 */
        #map {
            width: 100% !important;
            height: 100% !important;
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
        }

        /* 🟢 【ここが重要】SimpleMapsの拡大縮小の起点を、マウスカーソルが乗っている「要素の中心」へ強制的に上書き */
        #map svg {
            transform-origin: center !important;
        }

        #map svg path, #map svg polygon {
            transition: fill 0.15s ease, filter 0.15s ease, stroke 0.15s ease !important;
            cursor: pointer;
        }

        /* ホバー時のフォーカスエフェクト設定 */
        .sm-focus-effect {
            filter: brightness(1.2) !important;
            stroke: #ffffff !important;
            stroke-width: 3px !important;
        }

        /* 右側：データ管理・パレットエリア */
        .info-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            height: 620px;
        }

        .section-container {
            display: flex;
            flex-direction: column;
            height: 45%;
        }
        .section-container.short { height: 25%; }
        .section-container.palette-box { height: 30%; }

        .section-title {
            font-size: 14px;
            color: #475569;
            margin: 0 0 8px 0;
            border-bottom: 2px solid var(--color-primary);
            padding-bottom: 4px;
            font-weight: bold;
        }

        .scroll-list {
            overflow-y: auto;
            flex: 1;
            padding-right: 5px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .area-item {
            background: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 6px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
            transition: all 0.15s;
        }
        .area-item:hover { border-color: #94a3b8; }

        .area-name-text { font-weight: bold; font-size: 13px; }
        .shareholder-text { font-size: 11px; color: #64748b; margin-top: 1px;}

        .stamp-badges {
            display: flex;
            gap: 2px;
            color: var(--color-primary);
            font-size: 12px;
        }

        /* Simplemapsの試用版リンクを強制的に画面外へ飛ばして非表示にする */
        div[id^="simplemaps"] a[href*="simplemaps.com"],
        div[class^="simplemaps"] a[href*="simplemaps.com"],
        #map a[href*="simplemaps.com"],
        a[href="https://simplemaps.com"] {
            position: absolute !important;
            top: -9999px !important;
            left: -9999px !important;
            width: 1px !important;
            height: 1px !important;
            overflow: hidden !important;
            opacity: 1 !important; /* スクリプト側のopacityチェック対策 */
            visibility: visible !important; /* スクリプト側のvisibilityチェック対策 */
        }

        /* 🎨 カラーパレットシステム */
        .palette-wrapper {
            background: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .palette-header-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .current-color-bar {
            flex: 1;
            height: 28px;
            border-radius: 4px;
            border: 1px solid #94a3b8;
            background-color: #0000ff; 
            transition: background-color 0.15s;
        }

        .btn-home-zoom {
            background-color: #e2e8f0;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            width: 32px;
            height: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: background 0.15s;
        }
        .btn-home-zoom:hover {
            background-color: #cbd5e1;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
        }

        .color-cell {
            aspect-ratio: 1.5;
            border-radius: 4px;
            border: 1px solid #cbd5e1;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .color-cell:hover {
            transform: scale(1.08);
            border-color: #475569;
        }
        .color-cell.selected {
            border: 2px solid #000000;
            box-shadow: 0 0 4px rgba(0,0,0,0.3);
        }

        .control-panel {
            margin-top: 25px;
            background-color: #ffffff;
            padding: 20px;
            border-radius: 12px;
            width: 1250px;
            max-width: 100%;
            box-sizing: border-box;
            border: 1px solid #e2e8f0;
        }

        .mode-selector {
            margin-bottom: 15px;
            background: #f1f5f9;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn {
            background-color: #64748b;
            color: white;
            border: none;
            padding: 10px 18px;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 5px;
            font-weight: bold;
        }
        .btn:hover { background-color: #475569; }
        .btn.active { background-color: var(--color-primary); }
        .btn-paint { background-color: #059669; }
        .btn-paint:hover { background-color: #047857; }
        .btn-primary { background-color: #2563eb; }
        .btn-primary:hover { background-color: #1d4ed8; }
        .btn-danger { background-color: #ef4444; }
    </style>
</head>
<body>

    <h1>世界さんかく鉄道 ＆ 全国制覇オタ活マップ</h1>
    <div class="subtitle">【操作】地図の枠内でスクロール：拡大縮小 / ドラッグ：移動</div>

    <div id="broadcast-area">
        <div class="map-section" id="map-section-window">
            <div id="map"></div>
        </div>

        <div class="info-section">
            <div class="section-container">
                <h3 class="section-title" id="list-title">🗾 スタンプラリー状況</h3>
                <div class="scroll-list" id="main-data-list"></div>
            </div>

            <div class="section-container short">
                <h3 class="section-title">✈️ 海外・特別運行エリア</h3>
                <div class="scroll-list" id="overseas-list"></div>
            </div>

            <div class="section-container palette-box">
                <h3 class="section-title">🎨 カラーパレット（自由色塗りモード用）</h3>
                <div class="palette-wrapper">
                    <div class="palette-header-row">
                        <div class="current-color-bar" id="color-preview"></div>
                        <button class="btn-home-zoom" title="地図を初期状態に戻す" onclick="resetZoomAndPan()">🏠</button>
                    </div>
                    <div class="color-grid" id="color-palette-grid"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="control-panel">
        <h3 style="margin:0 0 10px 0; color:var(--color-primary); font-size:16px;">🛠️ 配信用管理パネル</h3>
        
        <div class="mode-selector">
            <strong>【現在のモード】: </strong>
            <button class="btn active" id="mode-pref-btn" onclick="switchMode('pref')">47都道府県スタンプ</button>
            <button class="btn" id="mode-region-btn" onclick="switchMode('region')">地方(9エリア)スタンプ</button>
            <button class="btn btn-paint" id="mode-paint-btn" onclick="switchMode('paint')">🎨 自由色塗りモード</button>
        </div>

        <button class="btn btn-primary" onclick="downloadMapImage()">現在のマップを画像として保存(DL)</button>
        <button class="btn" onclick="resetZoomAndPan()">ズーム・位置をリセット</button>
        <button class="btn" onclick="addOverseasArea()">海外エリアを新規追加</button>
        <button class="btn btn-danger" onclick="resetMapData()">全データをリセット</button>
    </div>

    <script>
        const prefList = [
            { id: "hokkaido", code: "JP01", name: "北海道", region: "hokkaido" },
            { id: "aomori", code: "JP02", name: "青森県", region: "tohoku" },
            { id: "iwate", code: "JP03", name: "岩手県", region: "tohoku" },
            { id: "miyagi", code: "JP04", name: "宮城県", region: "tohoku" },
            { id: "akita", code: "JP05", name: "秋田県", region: "tohoku" },
            { id: "yamagata", code: "JP06", name: "山形県", region: "tohoku" },
            { id: "fukushima", code: "JP07", name: "福島県", region: "tohoku" },
            { id: "ibaraki", code: "JP08", name: "茨城県", region: "kanto" },
            { id: "tochigi", code: "JP09", name: "栃木県", region: "kanto" },
            { id: "gunma", code: "JP10", name: "群馬県", region: "kanto" },
            { id: "saitama", code: "JP11", name: "埼玉県", region: "kanto" },
            { id: "chiba", code: "JP12", name: "千葉県", region: "kanto" },
            { id: "tokyo", code: "JP13", name: "東京都", region: "kanto" },
            { id: "kanagawa", code: "JP14", name: "神奈川県", region: "kanto" },
            { id: "niigata", code: "JP15", name: "新潟県", region: "chubu" },
            { id: "toyama", code: "JP16", name: "富山県", region: "chubu" },
            { id: "ishikawa", code: "JP17", name: "石川県", region: "chubu" },
            { id: "fukui", code: "JP18", name: "福井県", region: "chubu" },
            { id: "yamanashi", code: "JP19", name: "山梨県", region: "chubu" },
            { id: "nagano", code: "JP20", name: "長野県", region: "chubu" }, 
            { id: "gifu", code: "JP21", name: "岐阜県", region: "chubu" },
            { id: "shizuoka", code: "JP22", name: "静岡県", region: "chubu" },
            { id: "aichi", code: "JP23", name: "愛知県", region: "chubu" },
            { id: "mie", code: "JP24", name: "三重県", region: "kansai" },
            { id: "shiga", code: "JP25", name: "滋賀県", region: "kansai" },
            { id: "kyoto", code: "JP26", name: "京都府", region: "kansai" },
            { id: "osaka", code: "JP27", name: "大阪府", region: "kansai" },
            { id: "hyogo", code: "JP28", name: "兵庫県", region: "kansai" },
            { id: "nara", code: "JP29", name: "奈良県", region: "kansai" },
            { id: "wakayama", code: "JP30", name: "和歌山県", region: "kansai" },
            { id: "tottori", code: "JP31", name: "鳥取県", region: "chugoku" },
            { id: "shimane", code: "JP32", name: "島根県", region: "chugoku" },
            { id: "okayama", code: "JP33", name: "岡山県", region: "chugoku" },
            { id: "hiroshima", code: "JP34", name: "広島県", region: "chugoku" },
            { id: "yamaguchi", code: "JP35", name: "山口県", region: "chugoku" },
            { id: "tokushima", code: "JP36", name: "徳島県", region: "shikoku" },
            { id: "kagawa", code: "JP37", name: "香川県", region: "shikoku" },
            { id: "ehime", code: "JP38", name: "愛媛県", region: "shikoku" },
            { id: "kochi", code: "JP39", name: "高知県", region: "shikoku" },
            { id: "fukuoka", code: "JP40", name: "福岡県", region: "kyushu" },
            { id: "saga", code: "JP41", name: "佐賀県", region: "kyushu" },
            { id: "nagasaki", code: "JP42", name: "長崎県", region: "kyushu" },
            { id: "kumamoto", code: "JP43", name: "熊本県", region: "kyushu" },
            { id: "oita", code: "JP44", name: "大分県", region: "kyushu" },
            { id: "miyazaki", code: "JP45", name: "宮崎県", region: "kyushu" },
            { id: "kagoshima", code: "JP46", name: "鹿児島県", region: "kyushu" },
            { id: "okinawa", code: "JP47", name: "沖縄県", region: "kyushu" }
        ];

        const regionList = [
            { id: "hokkaido", name: "北海道エリア" }, { id: "tohoku", name: "東北エリア" },
            { id: "kanto", name: "関東エリア" }, { id: "chubu", name: "中部エリア" },
            { id: "kansai", name: "関西エリア" }, { id: "chugoku", name: "中国エリア" },
            { id: "shikoku", name: "四国エリア" }, { id: "kyushu", name: "九州・沖縄エリア" }
        ];

        const paletteColors = [
            "#000000", "#808080", "#c0c0c0", "#ffffff", "#800000",
            "#ff0000", "#800080", "#ff00ff", "#008000", "#00ff00",
            "#808000", "#ffff00", "#000080", "#0000ff", "#008000"
        ];

        let currentMode = "pref"; 
        let selectedColor = "#0000ff"; 

        let store = {
            pref: {}, region: {}, paintColors: {},
            overseas: [{ id: "vietnam", name: "ベトナムエリア", count: 0, shareholder: "ー", color: "" }]
        };

        prefList.forEach(p => { store.pref[p.code] = { count: 0, shareholder: "ー" }; store.paintColors[p.code] = ""; });
        regionList.forEach(r => { store.region[r.id] = { count: 0, shareholder: "ー" }; });

        // 🟢 【重要】SimpleMapsコアの標準スクロールズームを「許可(yes)」に変更（二重化バグを完全に防ぐ）
        if (typeof simplemaps_countrymap_mapdata !== 'undefined') {
            simplemaps_countrymap_mapdata.main_settings.all_states_zoomable = "no"; 
            simplemaps_countrymap_mapdata.main_settings.zoom = "yes"; // 1重の綺麗な純正ズームのみを許可
        }

        simplemaps_countrymap.hooks.complete = function() {
            setupMapClickHandlers();
            setupMapHoverHandlers(); 
            switchMode(currentMode);
        };

        window.onload = function() {
            const saved = localStorage.getItem('sankaku_simplemaps_data_v7');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    if(parsed.pref) store = parsed;
                    if(parsed.currentMode) currentMode = parsed.currentMode;
                    if(parsed.selectedColor) selectedColor = parsed.selectedColor;
                } catch(e){ console.error(e); }
            }
            createPaletteGrid();
        };

        function saveData() {
            store.currentMode = currentMode;
            store.selectedColor = selectedColor;
            localStorage.setItem('sankaku_simplemaps_data_v7', JSON.stringify(store));
        }

        function createPaletteGrid() {
            const grid = document.getElementById('color-palette-grid');
            const preview = document.getElementById('color-preview');
            preview.style.backgroundColor = selectedColor;

            paletteColors.forEach(color => {
                const cell = document.createElement('div');
                cell.className = 'color-cell';
                cell.style.backgroundColor = color;
                if(color === selectedColor) cell.classList.add('selected');

                cell.onclick = () => {
                    document.querySelectorAll('.color-cell').forEach(c => c.classList.remove('selected'));
                    cell.classList.add('selected');
                    selectedColor = color;
                    preview.style.backgroundColor = color;
                    saveData();
                };
                grid.appendChild(cell);
            });
        }

        // 🏠 地図全体の倍率と位置を、最初の初期状態へ一発できれいに戻す処理
        function resetZoomAndPan() {
            if (typeof simplemaps_countrymap !== 'undefined' && simplemaps_countrymap.back) {
                simplemaps_countrymap.back(); // コアの純正位置リセット関数をコール
            }
        }

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('mode-pref-btn').className = `btn ${mode==='pref'?'active':''}`;
            document.getElementById('mode-region-btn').className = `btn ${mode==='region'?'active':''}`;
            document.getElementById('mode-paint-btn').className = `btn btn-paint ${mode==='paint'?'active':''}`;
            
            const titleEl = document.getElementById('list-title');
            if(mode === 'pref') titleEl.textContent = "🗾 47都道府県スタンプラリー";
            if(mode === 'region') titleEl.textContent = "🗾 地方広域エリアラリー";
            if(mode === 'paint') titleEl.textContent = "🎨 都道府県リスト (自由塗りつぶし中)";
            
            document.querySelectorAll('#map path, #map polygon').forEach(p => p.classList.remove('sm-focus-effect'));
            
            saveData();
            render();
        }

        function setupMapHoverHandlers() {
            prefList.forEach(p => {
                const elements = document.querySelectorAll(`.sm_state_${p.code}`);
                elements.forEach(el => {
                    const paths = el.querySelectorAll('path, polygon');
                    
                    el.addEventListener('mouseenter', () => {
                        if (currentMode === 'region') {
                            const sameRegionPrefs = prefList.filter(pref => pref.region === p.region);
                            sameRegionPrefs.forEach(rPref => {
                                const targetPaths = document.querySelectorAll(`.sm_state_${rPref.code} path, .sm_state_${rPref.code} polygon`);
                                targetPaths.forEach(path => path.classList.add('sm-focus-effect'));
                            });
                        } else {
                            paths.forEach(path => path.classList.add('sm-focus-effect'));
                        }
                    });

                    el.addEventListener('mouseleave', () => {
                        document.querySelectorAll('#map path, #map polygon').forEach(path => {
                            path.classList.remove('sm-focus-effect');
                        });
                    });
                });
            });
        }

        function setupMapClickHandlers() {
            prefList.forEach(p => {
                const elements = document.querySelectorAll(`.sm_state_${p.code}`);
                elements.forEach(el => {
                    el.onclick = (e) => {
                        e.stopPropagation();
                        handleAreaClick(p.code, p.region);
                    };

                    el.oncontextmenu = (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        handleAreaRightClick(p.code, p.region, p.name);
                    };
                });
            });
        }

        function handleAreaClick(code, regionId) {
            if (currentMode === 'paint') {
                store.paintColors[code] = store.paintColors[code] === selectedColor ? "" : selectedColor;
            } else if (currentMode === 'pref') {
                store.pref[code].count = (store.pref[code].count + 1) % 6;
            } else if (currentMode === 'region') {
                const targetState = (store.region[regionId].count + 1) % 6;
                store.region[regionId].count = targetState;
            }
            saveData();
            render();
        }

        function handleAreaRightClick(code, regionId, name) {
            const dataObj = (currentMode === 'region') ? store.region[regionId] : store.pref[code];
            const displayTitle = (currentMode === 'region') ? regionList.find(r=>r.id===regionId).name : name;
            const newName = prompt(`「${displayTitle}」の筆頭株主名を入力してください:`, dataObj.shareholder);
            if (newName !== null) {
                dataObj.shareholder = newName.trim() === "" ? "ー" : newName;
                saveData();
                render();
            }
        }

        function render() {
            const mainList = document.getElementById('main-data-list');
            const overseasList = document.getElementById('overseas-list');
            
            mainList.innerHTML = '';
            overseasList.innerHTML = '';

            const stampColors = ["#88a4bc", "#ffe4e6", "#fecdd3", "#fda4af", "#fb7185", "#f43f5e"];

            prefList.forEach(p => {
                const elements = document.querySelectorAll(`.sm_state_${p.code}`);
                let fillHex = "#88a4bc";
                
                if (currentMode === 'paint') {
                    fillHex = store.paintColors[p.code] || "#88a4bc";
                } else if (currentMode === 'pref') {
                    fillHex = stampColors[store.pref[p.code].count];
                } else if (currentMode === 'region') {
                    fillHex = stampColors[store.region[p.region].count];
                }

                elements.forEach(el => {
                    const paths = el.querySelectorAll('path, polygon');
                    paths.forEach(path => path.style.fill = fillHex);
                });
            });

            if (currentMode === 'pref' || currentMode === 'paint') {
                prefList.forEach(p => {
                    const data = store.pref[p.code];
                    const row = createListRow(p.name, data, () => handleAreaClick(p.code, p.region), () => handleAreaRightClick(p.code, p.region, p.name));
                    if (currentMode === 'paint' && store.paintColors[p.code]) {
                        row.style.borderLeft = `5px solid ${store.paintColors[p.code]}`;
                    }
                    mainList.appendChild(row);
                });
            } else {
                regionList.forEach(r => {
                    const data = store.region[r.id];
                    mainList.appendChild(createListRow(r.name, data, () => handleAreaClick(null, r.id), () => handleAreaRightClick(null, r.id, null)));
                });
            }

            store.overseas.forEach(ov => {
                const row = document.createElement('div');
                row.className = `area-item`;
                if(ov.count > 0 && currentMode !== 'paint') row.style.backgroundColor = "var(--color-stamp-bg)";
                if(ov.color) row.style.borderLeft = `5px solid ${ov.color}`;

                row.innerHTML = `<div><div class="area-name-text">${ov.name}</div><div class="shareholder-text">株主: ${ov.shareholder}</div></div><div class="stamp-badges">${(ov.count > 0 && currentMode !== 'paint') ? "🔺".repeat(ov.count) : ""}</div>`;
                
                row.onclick = () => {
                    if (currentMode === 'paint') {
                        ov.color = ov.color === selectedColor ? "" : selectedColor;
                    } else {
                        ov.count = (ov.count + 1) % 6;
                    }
                    saveData(); render();
                };
                row.oncontextmenu = (e) => {
                    e.preventDefault();
                    const n = prompt(`「${ov.name}」の筆先株主名:`, ov.shareholder);
                    if(n !== null){ ov.shareholder = n.trim()===""?"ー":n; saveData(); render(); }
                };
                overseasList.appendChild(row);
            });
        }

        function createListRow(name, data, clickFn, rightClickFn) {
            const row = document.createElement('div');
            row.className = `area-item`;
            if (data.count > 0 && currentMode !== 'paint') row.style.backgroundColor = "var(--color-stamp-bg)";
            
            row.innerHTML = `<div><div class="area-name-text">${name}</div><div class="shareholder-text">株主: ${data.shareholder}</div></div><div class="stamp-badges">${(data.count > 0 && currentMode !== 'paint') ? "🔺".repeat(data.count) : ""}</div>`;
            row.onclick = clickFn;
            row.oncontextmenu = (e) => { e.preventDefault(); rightClickFn(); };
            return row;
        }

        function addOverseasArea() {
            const name = prompt("海外・特別エリア名を入力してください（例: ベトナムエリア）:");
            if (name && name.trim() !== "") {
                store.overseas.push({ id: "custom_" + Date.now(), name: name.trim(), count: 0, shareholder: "ー", color: "" });
                saveData(); render();
            }
        }

        function resetMapData() {
            if (confirm("本当に【すべてのスタンプ・色塗りデータ】を初期化しますか？")) {
                localStorage.removeItem('sankaku_simplemaps_data_v7');
                prefList.forEach(p => { store.pref[p.code] = { count: 0, shareholder: "ー" }; store.paintColors[p.code] = ""; });
                regionList.forEach(r => { store.region[r.id] = { count: 0, shareholder: "ー" }; });
                store.overseas = [{ id: "vietnam", name: "ベトナムエリア", count: 0, shareholder: "ー", color: "" }];
                resetZoomAndPan(); switchMode("pref");
            }
        }

        function downloadMapImage() {
            resetZoomAndPan();
            alert("進捗画像を生成します。保存完了のポップアップが出るまで数秒お待ちください。");
            setTimeout(() => {
                const target = document.getElementById('broadcast-area');
                html2canvas(target, { backgroundColor: '#ffffff', scale: 2 }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `さんかく鉄道_配信進捗_${new Date().toISOString().slice(0,10)}.png`;
                    link.href = canvas.toDataURL(); link.click();
                });
            }, 500);
        }
    </script>
</body>
</html>
