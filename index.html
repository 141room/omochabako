<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>世界さんかく鉄道 ＆ 全国制覇オタ活マップ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --color-unmarked: #88a4bc; /* 未達成（SimpleMaps仕様の美しいブルーグレー） */
            --color-stamp-bg: #fff1f2;  
            --color-primary: #ff4d94;   
            --border-color: #cbd5e1;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-bottom: 5px;
            font-size: 26px;
            color: var(--color-primary);
            font-weight: bold;
        }

        .subtitle {
            font-size: 14px;
            margin-bottom: 20px;
            color: #64748b;
        }

        #broadcast-area {
            background-color: #ffffff;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 1250px;
            max-width: 100%;
            box-sizing: border-box;
            border: 2px solid #e2e8f0;
            display: flex;
            gap: 25px;
        }

        /* 左側：リアル日本地図表示コンテナ */
        .map-section {
            flex: 1.3;
            height: 620px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            background: #ffffff;
            position: relative;
            overflow: hidden;
            cursor: grab;
        }
        .map-section:active {
            cursor: grabbing;
        }

        #map-container-inner {
            width: 100%;
            height: 100%;
            transform-origin: 0 0; /* マウス中心のズームのための固定原点 */
            position: absolute;
            top: 0;
            left: 0;
        }

        /* 埋め込みSVGの最適化 */
        #japan-svg {
            width: 100%;
            height: 100%;
        }

        .sm_state {
            fill: var(--color-unmarked);
            stroke: #ffffff;
            stroke-width: 1.875;
            stroke-linejoin: round;
            cursor: pointer;
            transition: fill 0.15s ease, opacity 0.15s ease;
        }
        .sm_state:hover {
            opacity: 0.8;
        }

        /* 右側：データ管理・パレットエリア */
        .info-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            height: 620px;
        }

        .section-container {
            display: flex;
            flex-direction: column;
            height: 45%;
        }
        .section-container.short { height: 25%; }
        .section-container.palette-box { height: 30%; }

        .section-title {
            font-size: 14px;
            color: #475569;
            margin: 0 0 8px 0;
            border-bottom: 2px solid var(--color-primary);
            padding-bottom: 4px;
            font-weight: bold;
        }

        .scroll-list {
            overflow-y: auto;
            flex: 1;
            padding-right: 5px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .area-item {
            background: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 6px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
            transition: all 0.15s;
        }
        .area-item:hover { border-color: #94a3b8; }

        .area-name-text { font-weight: bold; font-size: 13px; }
        .shareholder-text { font-size: 11px; color: #64748b; margin-top: 1px;}

        .stamp-badges {
            display: flex;
            gap: 2px;
            color: var(--color-primary);
            font-size: 12px;
        }

        /* 🎨 カラーパレット */
        .palette-wrapper {
            background: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .current-color-bar {
            height: 24px;
            border-radius: 4px;
            border: 1px solid #94a3b8;
            background-color: #0000ff; 
            transition: background-color 0.15s;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
        }

        .color-cell {
            aspect-ratio: 1.5;
            border-radius: 4px;
            border: 1px solid #cbd5e1;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .color-cell:hover {
            transform: scale(1.08);
            border-color: #475569;
        }
        .color-cell.selected {
            border: 2px solid #000000;
            box-shadow: 0 0 4px rgba(0,0,0,0.3);
        }

        .control-panel {
            margin-top: 25px;
            background-color: #ffffff;
            padding: 20px;
            border-radius: 12px;
            width: 1250px;
            max-width: 100%;
            box-sizing: border-box;
            border: 1px solid #e2e8f0;
        }

        .mode-selector {
            margin-bottom: 15px;
            background: #f1f5f9;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn {
            background-color: #64748b;
            color: white;
            border: none;
            padding: 10px 18px;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 5px;
            font-weight: bold;
        }
        .btn:hover { background-color: #475569; }
        .btn.active { background-color: var(--color-primary); }
        .btn-paint { background-color: #059669; }
        .btn-paint:hover { background-color: #047857; }
        .btn-primary { background-color: #2563eb; }
        .btn-primary:hover { background-color: #1d4ed8; }
        .btn-danger { background-color: #ef4444; }
    </style>
</head>

        ];

        const paletteColors = [
            "#000000", "#808080", "#c0c0c0", "#ffffff", "#800000",

            "#808000", "#ffff00", "#000080", "#0000ff", "#008080"
        ];

        let currentMode = "pref";

            overseas: [{ id: "vietnam", name: "ベトナムエリア", count: 0, shareholder: "ー", color: "" }]
        };

        // 初期ハッシュの生成
        prefList.forEach(p => { store.pref[p.code] = { count: 0, shareholder: "ー" }; store.paintColors[p.code] = ""; });
        regionList.forEach(r => { store.region[r.id] = { count: 0, shareholder: "ー" }; });

        // ズーム・ドラッグ用変数
        let scale = 1, posX = 0, posY = 0, isDragging = false, startX, startY;
        const mapWindow = document.getElementById('map-section-window');
        const mapInner = document.getElementById('map-container-inner');

        window.onload = function() {
            const saved = localStorage.getItem('sankaku_embed_perfect_data');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    if(parsed.pref) store = parsed;
                    if(parsed.currentMode) currentMode = parsed.currentMode;
                    if(parsed.selectedColor) selectedColor = parsed.selectedColor;
                } catch(e){ console.error(e); }
            }
            createPaletteGrid();
            setupZoomAndPan();
            setupEmbeddedSvgEvents();
            switchMode(currentMode);
        };

        function saveData() {
            store.currentMode = currentMode;
            store.selectedColor = selectedColor;
            localStorage.setItem('sankaku_embed_perfect_data', JSON.stringify(store));
        }

        function createPaletteGrid() {
            const grid = document.getElementById('color-palette-grid');
            const preview = document.getElementById('color-preview');
            preview.style.backgroundColor = selectedColor;

            paletteColors.forEach(color => {
                const cell = document.createElement('div');
                cell.className = 'color-cell';
                cell.style.backgroundColor = color;
                if(color === selectedColor) cell.classList.add('selected');

                cell.onclick = () => {
                    document.querySelectorAll('.color-cell').forEach(c => c.classList.remove('selected'));
                    cell.classList.add('selected');
                    selectedColor = color;
                    preview.style.backgroundColor = color;
                    saveData();
                };
                grid.appendChild(cell);
            });
        }

        // 🎯 マウスカーソルの位置を中心にして滑らかに拡大縮小するズームロジック
        function setupZoomAndPan() {
            mapWindow.addEventListener('wheel', function(e) {
                e.preventDefault();
                
                const zoomFactor = 0.15;
                const rect = mapWindow.getBoundingClientRect();
                
                // マウスのローカル座標を取得
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;

                // ズーム前のSVG上の仮想的な中心座標を逆算
                const svgX = (mouseX - posX) / scale;
                const svgY = (mouseY - posY) / scale;

                // スケールの増減
                if (e.deltaY < 0) { scale += zoomFactor; } else { scale -= zoomFactor; }
                scale = Math.min(Math.max(0.4, scale), 8);

                // マウス位置がズレないように新しい posX, posY を固定
                posX = mouseX - svgX * scale;
                posY = mouseY - svgY * scale;

                updateTransform();
            }, { passive: false });

            mapWindow.addEventListener('mousedown', function(e) {
                if(e.button !== 0) return; // 左ドラッグのみ
                isDragging = true;
                startX = e.clientX - posX;
                startY = e.clientY - posY;
            });

            window.addEventListener('mousemove', function(e) {
                if (!isDragging) return;
                posX = e.clientX - startX;
                posY = e.clientY - startY;
                updateTransform();
            });

            window.addEventListener('mouseup', () => { isDragging = false; });
        }

        function updateTransform() {
            mapInner.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
        }

        function resetZoomAndPan() {
            scale = 1; posX = 0; posY = 0;
            updateTransform();
        }

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('mode-pref-btn').className = `btn ${mode==='pref'?'active':''}`;
            document.getElementById('mode-region-btn').className = `btn ${mode==='region'?'active':''}`;
            document.getElementById('mode-paint-btn').className = `btn btn-paint ${mode==='paint'?'active':''}`;
            
            const titleEl = document.getElementById('list-title');
            if(mode === 'pref') titleEl.textContent = "🗾 47都道府県スタンプラリー";
            if(mode === 'region') titleEl.textContent = "🗾 地方広域エリアラリー";
            if(mode === 'paint') titleEl.textContent = "🎨 都道府県リスト (自由塗りつぶし中)";
            
            saveData();
            render();
        }

        // 埋め込みSVG内の各パーツに直接イベントハンドラを注入する
        function setupEmbeddedSvgEvents() {
            prefList.forEach(p => {
                const path = document.querySelector(`.sm_state_${p.code}`);
                if (path) {
                    // 左クリック
                    path.onclick = (e) => {
                        e.stopPropagation();
                        handleAreaClick(p.code, p.region);
                    };
                    // 右クリック
                    path.oncontextmenu = (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        handleAreaRightClick(p.code, p.region, p.name);
                    };
                }
            });
        }

        function handleAreaClick(code, regionId) {
            if (currentMode === 'paint') {
                store.paintColors[code] = store.paintColors[code] === selectedColor ? "" : selectedColor;
            } else if (currentMode === 'pref') {
                store.pref[code].count = (store.pref[code].count + 1) % 6;
            } else if (currentMode === 'region') {
                const targetState = (store.region[regionId].count + 1) % 6;
                store.region[regionId].count = targetState;
            }
            saveData();
            render();
        }

        function handleAreaRightClick(code, regionId, name) {
            const dataObj = (currentMode === 'region') ? store.region[regionId] : store.pref[code];
            const displayTitle = (currentMode === 'region') ? regionList.find(r=>r.id===regionId).name : name;
            const newName = prompt(`「${displayTitle}」の筆頭株主名を入力してください:`, dataObj.shareholder);
            if (newName !== null) {
                dataObj.sharedholder = newName.trim() === "" ? "ー" : newName;
                dataObj.shareholder = newName.trim() === "" ? "ー" : newName; // 誤字防止両面セット
                saveData();
                render();
            }
        }

        function render() {
            const mainList = document.getElementById('main-data-list');
            const overseasList = document.getElementById('overseas-list');
            
            mainList.innerHTML = '';
            overseasList.innerHTML = '';

            // スタンプモード用のグラデーションピンク
            const stampColors = ["#88a4bc", "#ffe4e6", "#fecdd3", "#fda4af", "#fb7185", "#f43f5e"];

            // 1. 地図（SVG）の全パーツの色書き換え
            prefList.forEach(p => {
                const path = document.querySelector(`.sm_state_${p.code}`);
                if (path) {
                    if (currentMode === 'paint') {
                        path.style.fill = store.paintColors[p.code] || "#88a4bc";
                    } else if (currentMode === 'pref') {
                        path.style.fill = stampColors[store.pref[p.code].count];
                    } else if (currentMode === 'region') {
                        path.style.fill = stampColors[store.region[p.region].count];
                    }
                }
            });

            // 2. 右側データリストの生成
            if (currentMode === 'pref' || currentMode === 'paint') {
                prefList.forEach(p => {
                    const data = store.pref[p.code];
                    const row = createListRow(p.name, data, () => handleAreaClick(p.code, p.region), () => handleAreaRightClick(p.code, p.region, p.name));
                    if (currentMode === 'paint' && store.paintColors[p.code]) {
                        row.style.borderLeft = `5px solid ${store.paintColors[p.code]}`;
                    }
                    mainList.appendChild(row);
                });
            } else {
                regionList.forEach(r => {
                    const data = store.region[r.id];
                    mainList.appendChild(createListRow(r.name, data, () => handleAreaClick(null, r.id), () => handleAreaRightClick(null, r.id, null)));
                });
            }

            // 3. 海外特別枠リストの生成
            store.overseas.forEach(ov => {
                const row = document.createElement('div');
                row.className = `area-item`;
                if(ov.count > 0 && currentMode !== 'paint') row.style.backgroundColor = "var(--color-stamp-bg)";
                if(ov.color) row.style.borderLeft = `5px solid ${ov.color}`;

                row.innerHTML = `<div><div class="area-name-text">${ov.name}</div><div class="shareholder-text">株主: ${ov.shareholder}</div></div><div class="stamp-badges">${(ov.count > 0 && currentMode !== 'paint') ? "🔺".repeat(ov.count) : ""}</div>`;
                
                row.onclick = () => {
                    if (currentMode === 'paint') {
                        ov.color = ov.color === selectedColor ? "" : selectedColor;
                    } else {
                        ov.count = (ov.count + 1) % 6;
                    }
                    saveData(); render();
                };
                row.oncontextmenu = (e) => {
                    e.preventDefault();
                    const n = prompt(`「${ov.name}」の筆頭株主名:`, ov.shareholder);
                    if(n !== null){ ov.shareholder = n.trim()===""?"ー":n; saveData(); render(); }
                };
                overseasList.appendChild(row);
            });
        }

        function createListRow(name, data, clickFn, rightClickFn) {
            const row = document.createElement('div');
            row.className = `area-item`;
            if (data.count > 0 && currentMode !== 'paint') row.style.backgroundColor = "var(--color-stamp-bg)";
            
            row.innerHTML = `<div><div class="area-name-text">${name}</div><div class="shareholder-text">株主: ${data.shareholder}</div></div><div class="stamp-badges">${(data.count > 0 && currentMode !== 'paint') ? "🔺".repeat(data.count) : ""}</div>`;
            row.onclick = clickFn;
            row.oncontextmenu = (e) => { e.preventDefault(); rightClickFn(); };
            return row;
        }

        function addOverseasArea() {
            const name = prompt("海外・特別エリア名を入力してください:");
            if (name && name.trim() !== "") {
                store.overseas.push({ id: "custom_" + Date.now(), name: name.trim(), count: 0, shareholder: "ー", color: "" });
                saveData(); render();
            }
        }

        function resetMapData() {
            if (confirm("本当に【全データをリセット】して初期化しますか？")) {
                localStorage.removeItem('sankaku_embed_perfect_data');
                prefList.forEach(p => { store.pref[p.code] = { count: 0, shareholder: "ー" }; store.paintColors[p.code] = ""; });
                regionList.forEach(r => { store.region[r.id] = { count: 0, shareholder: "ー" }; });
                store.overseas = [{ id: "vietnam", name: "ベトナムエリア", count: 0, shareholder: "ー", color: "" }];
                resetZoomAndPan(); switchMode("pref");
            }
        }

        function downloadMapImage() {
            resetZoomAndPan();
            alert("進捗画像を生成します。保存完了のポップアップが出るまで数秒お待ちください。");
            setTimeout(() => {
                const target = document.getElementById('broadcast-area');
                html2canvas(target, { backgroundColor: '#ffffff', scale: 2 }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `世界さんかく鉄道_配信マップ_${new Date().toISOString().slice(0,10)}.png`;
                    link.href = canvas.toDataURL(); link.click();
                });
            }, 500);
        }
    </script>
</body>
</html>
