<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>47都道府県完全網羅 ＆ 世界さんかく鉄道マップ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/svg-pan-zoom/3.6.1/svg-pan-zoom.min.js"></script>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --color-unmarked: #f1f5f9; /* 未達成 */
            --color-stamp-bg: #fff1f2;  /* スタンプがある都道府県の背景 */
            --color-primary: #ff4d94;   /* さんかく推し色 */
            --border-color: #cbd5e1;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-bottom: 5px;
            font-size: 26px;
            color: var(--color-primary);
            font-weight: bold;
        }

        .subtitle {
            font-size: 14px;
            margin-bottom: 20px;
            color: #64748b;
        }

        /* 配信画面対象エリア */
        #broadcast-area {
            background-color: #ffffff;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 1100px;
            max-width: 100%;
            box-sizing: border-box;
            border: 2px solid #e2e8f0;
            display: flex;
            gap: 25px;
        }

        /* 左側：日本地図（ズーム・移動可能コンテナ） */
        .map-section {
            flex: 1.5;
            height: 600px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            background: #ffffff;
            position: relative;
            overflow: hidden;
        }

        #japan-svg {
            width: 100%;
            height: 100%;
        }

        /* 都道府県（パス）の基本スタイル */
        .pref {
            fill: var(--color-unmarked);
            stroke: #94a3b8;
            stroke-width: 0.5;
            cursor: pointer;
            transition: fill 0.2s ease;
        }
        .pref:hover {
            fill: #e2e8f0;
        }

        /* スタンプ数に応じた地図の色付け（段階的に濃く） */
        .pref.s1 { fill: #ffe4e6; }
        .pref.s2 { fill: #fecdd3; }
        .pref.s3 { fill: #fda4af; }
        .pref.s4 { fill: #fb7185; }
        .pref.s5 { fill: #f43f5e; }

        /* 地図上のスタンプ（テキストマークやドット用） */
        .map-stamp-text {
            font-size: 7px;
            font-weight: bold;
            fill: var(--color-primary);
            pointer-events: none;
            text-shadow: 0 0 2px #fff, 0 0 2px #fff;
        }

        .pref-label {
            font-size: 5px;
            fill: #64748b;
            pointer-events: none;
        }

        /* 右側：スクロール可能なリスト・情報エリア */
        .info-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: 600px;
        }

        .section-container {
            display: flex;
            flex-direction: column;
            height: 50%;
        }
        .section-container.half { height: 65%; }
        .section-container.short { height: 35%; }

        .section-title {
            font-size: 15px;
            color: #475569;
            margin: 0 0 8px 0;
            border-bottom: 2px solid var(--color-primary);
            padding-bottom: 4px;
            font-weight: bold;
        }

        .scroll-list {
            overflow-y: auto;
            flex: 1;
            padding-right: 5px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* リストアイテム */
        .area-item {
            background: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
            transition: all 0.15s;
        }
        .area-item:hover { border-color: #94a3b8; }
        .area-item.has-stamp { background-color: var(--color-stamp-bg); border-color: #fecdd3; }

        .area-name-text { font-weight: bold; font-size: 14px; }
        .shareholder-text { font-size: 12px; color: #64748b; margin-top: 2px;}
        .has-stamp .shareholder-text { color: var(--color-primary); font-weight: 500; }

        .stamp-badges {
            display: flex;
            gap: 2px;
            color: var(--color-primary);
            font-size: 14px;
        }

        /* 管理パネル */
        .control-panel {
            margin-top: 25px;
            background-color: #ffffff;
            padding: 20px;
            border-radius: 12px;
            width: 1100px;
            max-width: 100%;
            box-sizing: border-box;
            border: 1px solid #e2e8f0;
        }

        .btn {
            background-color: #64748b;
            color: white;
            border: none;
            padding: 10px 18px;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 10px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .btn:hover { background-color: #475569; }
        .btn-primary { background-color: var(--color-primary); }
        .btn-primary:hover { background-color: #e03a80; }
        .btn-danger { background-color: #ef4444; }

        .hint { font-size: 12px; color: #64748b; margin: 0; }
    </style>
</head>

        <div class="info-section">
            <div class="section-container half">
                <h3 class="section-title">🗾 47都道府県スタンプラリー</h3>
                <div class="scroll-list" id="domestic-list">
                    </div>
            </div>

            <div class="section-container short">
                <h3 class="section-title">✈️ 海外・特別運行エリア</h3>
                <div class="scroll-list" id="overseas-list">
                    </div>

    <div class="control-panel">
        <h3 style="margin:0 0 10px 0; color:var(--color-primary); font-size:16px;">🛠️ 配信用管理パネル</h3>
        <button class="btn btn-primary" onclick="downloadMapImage()">現在のマップを画像として保存(DL)</button>
        <button class="btn" onclick="resetZoom()">地図のズームをリセット</button>
        <button class="btn" onclick="addOverseasArea()">海外エリアを新規追加</button>
        <button class="btn btn-danger" onclick="resetMapData()">データをすべてリセット</button>
        <p class="hint">※入力したデータはブラウザに自動保存されます。配信画面に映す際は、下部のこのパネルをOBSのクロップ機能等で隠してください。</p>
    </div>

    <script>
        // 都道府県名定義
        const prefNames = [
            "北海道","青森","岩手","宮城","秋田","山形","福島","茨城","栃木","群馬",
            "埼玉","千葉","東京","神奈川","新潟","富山","石川","福井","山梨","長野",
            "岐阜","静岡","愛知","三重","滋賀","京都","大阪","兵庫","奈良","和歌山",
            "鳥取","島根","岡山","広島","山口","徳島","香川","愛媛","高知","福岡",
            "佐賀","長崎","熊本","大分","宮崎","鹿児島","沖縄"
        ];

        // 初期データ
        let mapData = {
            domestic: prefNames.map((name, i) => ({ id: i + 1, name: name, count: 0, shareholder: "ー" })),
            overseas: [{ id: "vietnam", name: "ベトナムエリア", count: 0, shareholder: "ー" }]
        };

        let panZoomInstance = null;

        function loadData() {
            const saved = localStorage.getItem('sankaku_map_v3_47pref');
            if (saved) {
                try { mapData = JSON.parse(saved); } catch (e) { console.error(e); }
            }
            initSvgZoom();
            render();
        }

        function saveData() {
            localStorage.setItem('sankaku_map_v3_47pref', JSON.stringify(mapData));
        }

        // ズーム機能の初期化
        function initSvgZoom() {
            panZoomInstance = svgPanZoom('#japan-svg', {
                zoomEnabled: true,
                controlIconsEnabled: false,
                fit: true,
                center: true,
                minZoom: 0.8,
                maxZoom: 15,
                zoomScaleSensitivity: 0.3
            });
        }

        function resetZoom() {
            if (panZoomInstance) {
                panZoomInstance.resetZoom();
                panZoomInstance.resetPan();
            }
        }

        function toggleStamp(area, isDomestic) {
            area.count = (area.count + 1) % 6; // 0~5個でループ
            saveData();
            render();
        }

        function editShareholder(area) {
            const newName = prompt(`「${area.name}」の筆頭株主を入力してください:`, area.shareholder);
            if (newName !== null) {
                area.shareholder = newName.trim() === "" ? "ー" : newName;
                saveData();
                render();
            }
        }

        function render() {
            const domesticList = document.getElementById('domestic-list');
            const overseasList = document.getElementById('overseas-list');
            const stampLayer = document.getElementById('stamp-layer');
            
            domesticList.innerHTML = '';
            overseasList.innerHTML = '';
            stampLayer.innerHTML = '';

            // 1. 国内データの反映
            mapData.domestic.forEach(area => {
                // リストアイテム
                domesticList.appendChild(createAreaRow(area, true));

                // SVG地図の着色
                const path = document.getElementById(`pref_${area.id}`);
                if (path) {
                    path.className.baseVal = `pref s${area.count}`;
                    path.onclick = () => toggleStamp(area, true);
                    path.oncontextmenu = (e) => { e.preventDefault(); editShareholder(area); };

                    // 地図上にスタンプ（🔺）を描画
                    if (area.count > 0) {
                        const bbox = path.getBBox();
                        const cx = bbox.x + bbox.width / 2;
                        const cy = bbox.y + bbox.height / 2;
                        
                        const textNode = document.createElementNS("http://www.w3.org/2000/svg", "text");
                        textNode.setAttribute("x", cx - (area.count * 3));
                        textNode.setAttribute("y", cy + 8); // ラベルに重なりすぎないよう微調整
                        textNode.setAttribute("class", "map-stamp-text");
                        textNode.textContent = "🔺".repeat(area.count);
                        stampLayer.appendChild(textNode);
                    }
                }
            });

            // 2. 海外データの反映
            mapData.overseas.forEach(area => {
                overseasList.appendChild(createAreaRow(area, false));
            });
        }

        function createAreaRow(area, isDomestic) {
            const row = document.createElement('div');
            row.className = `area-item ${area.count > 0 ? 'has-stamp' : ''}`;

            const stars = area.count > 0 ? "🔺".repeat(area.count) : "未出発";

            row.innerHTML = `
                <div>
                    <div class="area-name-text">${area.name}</div>
                    <div class="shareholder-text">株主: ${area.shareholder}</div>
                </div>
                <div class="stamp-badges">${stars}</div>
            `;

            row.onclick = () => toggleStamp(area, isDomestic);
            row.oncontextmenu = (e) => { e.preventDefault(); editShareholder(area); };
            return row;
        }

        function addOverseasArea() {
            const name = prompt("追加する海外・特別エリア名を入力してください（例: タイエリア）:");
            if (name && name.trim() !== "") {
                const id = "custom_" + Date.now();
                mapData.overseas.push({ id: id, name: name.trim(), count: 0, shareholder: "ー" });
                saveData();
                render();
            }
        }

        function resetMapData() {
            if (confirm("本当に【すべてのスタンプ・株主データ】を初期化してもよろしいですか？")) {
                localStorage.removeItem('sankaku_map_v3_47pref');
                mapData.domestic.forEach(a => { a.count = 0; a.shareholder = "ー"; });
                mapData.overseas = [{ id: "vietnam", name: "ベトナムエリア", count: 0, shareholder: "ー" }];
                saveData();
                render();
                resetZoom();
            }
        }

        function downloadMapImage() {
            resetZoom(); // 画像保存時は一旦全体図に戻す
            setTimeout(() => {
                const broadcastArea = document.getElementById('broadcast-area');
                html2canvas(broadcastArea, { backgroundColor: '#ffffff', scale: 2 }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `さんかく鉄道_全国47都道府県マップ_${new Date().toISOString().slice(0,10)}.png`;
                    link.href = canvas.toDataURL();
                    link.click();
                });
            }, 200);
        }

        window.onload = loadData;
    </script>
</body>
</html>
