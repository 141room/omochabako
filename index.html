<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>世界さんかく鉄道 ＆ 全国制覇オタ活マップ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --color-unmarked: #f1f5f9; /* 未達成 */
            --color-stamp-bg: #fff1f2;  /* スタンプあり背景 */
            --color-primary: #ff4d94;   /* さんかく推し色 */
            --border-color: #cbd5e1;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-bottom: 5px;
            font-size: 26px;
            color: var(--color-primary);
            font-weight: bold;
        }

        .subtitle {
            font-size: 14px;
            margin-bottom: 20px;
            color: #64748b;
        }

        /* 配信画面対象エリア */
        #broadcast-area {
            background-color: #ffffff;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 1150px;
            max-width: 100%;
            box-sizing: border-box;
            border: 2px solid #e2e8f0;
            display: flex;
            gap: 25px;
        }

        /* 左側：外部SVGマップ表示コンテナ（ズーム・移動） */
        .map-section {
            flex: 1.4;
            height: 600px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            background: #ffffff;
            position: relative;
            overflow: hidden;
            cursor: grab;
        }
        .map-section:active {
            cursor: grabbing;
        }

        /* 外部SVGをオブジェクトとして埋め込む枠 */
        #map-container-inner {
            width: 100%;
            height: 100%;
            transform-origin: 0 0;
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none; /* イベントは背後のラッパーで制御するため一時無効化、JSで補正 */
        }

        #external-map-object {
            width: 100%;
            height: 100%;
        }

        /* 右側：データ管理リスト */
        .info-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: 600px;
        }

        .section-container {
            display: flex;
            flex-direction: column;
            height: 70%;
        }
        .section-container.short { height: 30%; }

        .section-title {
            font-size: 15px;
            color: #475569;
            margin: 0 0 8px 0;
            border-bottom: 2px solid var(--color-primary);
            padding-bottom: 4px;
            font-weight: bold;
        }

        .scroll-list {
            overflow-y: auto;
            flex: 1;
            padding-right: 5px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* リストアイテム */
        .area-item {
            background: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
            transition: all 0.15s;
        }
        .area-item:hover { border-color: #94a3b8; }
        .area-item.has-stamp { background-color: var(--color-stamp-bg); border-color: #fecdd3; }

        .area-name-text { font-weight: bold; font-size: 14px; }
        .shareholder-text { font-size: 12px; color: #64748b; margin-top: 2px;}
        .has-stamp .shareholder-text { color: var(--color-primary); font-weight: 500; }

        .stamp-badges {
            display: flex;
            gap: 2px;
            color: var(--color-primary);
            font-size: 14px;
        }

        /* 管理パネル */
        .control-panel {
            margin-top: 25px;
            background-color: #ffffff;
            padding: 20px;
            border-radius: 12px;
            width: 1150px;
            max-width: 100%;
            box-sizing: border-box;
            border: 1px solid #e2e8f0;
        }

        .mode-selector {
            margin-bottom: 15px;
            background: #f1f5f9;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn {
            background-color: #64748b;
            color: white;
            border: none;
            padding: 10px 18px;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 5px;
            font-weight: bold;
        }
        .btn:hover { background-color: #475569; }
        .btn.active { background-color: var(--color-primary); }
        .btn-primary { background-color: #2563eb; }
        .btn-primary:hover { background-color: #1d4ed8; }
        .btn-danger { background-color: #ef4444; }

        .hint { font-size: 12px; color: #64748b; margin-top: 10px; margin-bottom: 0; }
    </style>
</head>
<body>

    <h1>世界さんかく鉄道 ＆ 全国制覇オタ活マップ</h1>
    <div class="subtitle">【操作】地図の上でホイールスクロール：拡大縮小 / ドラッグ：移動 | リストまたは地図を左クリック：スタンプ | 右クリック：株主入力</div>

    <div id="broadcast-area">
        <div class="map-section" id="map-section-window">
            <div id="map-container-inner">
                <object id="external-map-object" type="image/svg+xml" data="map-full.svg"></object>
            </div>
        </div>

        <div class="info-section">
            <div class="section-container" style="height: 65%;">
                <h3 class="section-title" id="list-title">🗾 スタンプラリー状況</h3>
                <div class="scroll-list" id="main-data-list">
                    </div>
            </div>

            <div class="section-container short" style="height: 35%;">
                <h3 class="section-title">✈️ 海外・特別運行エリア</h3>
                <div class="scroll-list" id="overseas-list">
                    </div>
            </div>
        </div>
    </div>

    <div class="control-panel">
        <h3 style="margin:0 0 10px 0; color:var(--color-primary); font-size:16px;">🛠️ 配信用管理パネル</h3>
        
        <div class="mode-selector">
            <strong>【モード切替】: </strong>
            <button class="btn active" id="mode-pref-btn" onclick="switchMode('pref')">47都道府県モード</button>
            <button class="btn" id="mode-region-btn" onclick="switchMode('region')">地方(9エリア)モード</button>
        </div>

        <button class="btn btn-primary" onclick="downloadMapImage()">現在のマップを画像として保存(DL)</button>
        <button class="btn" onclick="resetZoomAndPan()">ズーム・位置をリセット</button>
        <button class="btn" onclick="addOverseasArea()">海外エリアを新規追加</button>
        <button class="btn btn-danger" onclick="resetMapData()">全データをリセット</button>
        <p class="hint">※同一階層に「map-full.svg」が正しく配置されている必要があります。配信時はこの管理パネルをOBS側でクロップして隠してください。</p>
    </div>

    <script>
        // 一般的な高精度SVGマップのID群に対応するマッピング
        // ご提示いただいたマップ内の各パスのid属性（または順番）と連動させるベース定義
        const prefList = [
            { id: "jp-1", name: "北海道", region: "hokkaido" },
            { id: "jp-2", name: "青森県", region: "tohoku" }, { id: "jp-3", name: "岩手県", region: "tohoku" },
            { id: "jp-4", name: "宮城県", region: "tohoku" }, { id: "jp-5", name: "秋田県", region: "tohoku" },
            { id: "jp-6", name: "山形県", region: "tohoku" }, { id: "jp-7", name: "福島県", region: "tohoku" },
            { id: "jp-8", name: "茨城県", region: "kanto" }, { id: "jp-9", name: "栃木県", region: "kanto" },
            { id: "jp-10", name: "群馬県", region: "kanto" }, { id: "jp-11", name: "埼玉県", region: "kanto" },
            { id: "jp-12", name: "千葉県", region: "kanto" }, { id: "jp-13", name: "東京都", region: "kanto" },
            { id: "jp-14", name: "神奈川県", region: "kanto" },
            { id: "jp-15", name: "新潟県", region: "chubu" }, { id: "jp-16", name: "富山県", region: "chubu" },
            { id: "jp-17", name: "石川県", region: "chubu" }, { id: "jp-18", name: "福井県", region: "chubu" },
            { id: "jp-19", name: "山梨県", region: "chubu" }, { id: "jp-20", name: "長野県", region: "chubu" },
            { id: "jp-21", name: "岐阜県", region: "chubu" }, { id: "jp-22", name: "静岡県", region: "chubu" },
            { id: "jp-23", name: "愛知県", region: "chubu" },
            { id: "jp-24", name: "三重県", region: "kansai" }, { id: "jp-25", name: "滋賀県", region: "kansai" },
            { id: "jp-26", name: "京都府", region: "kansai" }, { id: "jp-27", name: "大阪府", region: "kansai" },
            { id: "jp-28", name: "兵庫県", region: "kansai" }, { id: "jp-29", name: "奈良県", region: "kansai" },
            { id: "jp-30", name: "和歌山県", region: "kansai" },
            { id: "jp-31", name: "鳥取県", region: "chugoku" }, { id: "jp-32", name: "島根県", region: "chugoku" },
            { id: "jp-33", name: "岡山県", region: "chugoku" }, { id: "jp-34", name: "広島県", region: "chugoku" },
            { id: "jp-35", name: "山口県", region: "chugoku" },
            { id: "jp-36", name: "徳島県", region: "shikoku" }, { id: "jp-37", name: "香川県", region: "shikoku" },
            { id: "jp-38", name: "愛媛県", region: "shikoku" }, { id: "jp-39", name: "高知県", region: "shikoku" },
            { id: "jp-40", name: "福岡県", region: "kyushu" }, { id: "jp-41", name: "佐賀県", region: "kyushu" },
            { id: "jp-42", name: "長崎県", region: "kyushu" }, { id: "jp-43", name: "熊本県", region: "kyushu" },
            { id: "jp-44", name: "大分県", region: "kyushu" }, { id: "jp-45", name: "宮崎県", region: "kyushu" },
            { id: "jp-46", name: "鹿児島県", region: "kyushu" }, { id: "jp-47", name: "沖縄県", region: "kyushu" }
        ];

        const regionList = [
            { id: "hokkaido", name: "北海道エリア" }, { id: "tohoku", name: "東北エリア" },
            { id: "kanto", name: "関東エリア" }, { id: "chubu", name: "中部エリア" },
            { id: "kansai", name: "関西エリア" }, { id: "chugoku", name: "中国エリア" },
            { id: "shikoku", name: "四国エリア" }, { id: "kyushu", name: "九州・沖縄エリア" }
        ];

        let currentMode = "pref"; 
        let store = {
            pref: {},
            region: {},
            overseas: [{ id: "vietnam", name: "ベトナムエリア", count: 0, shareholder: "ー" }]
        };

        // 初期データ生成
        prefList.forEach(p => { store.pref[p.id] = { count: 0, shareholder: "ー" }; });
        regionList.forEach(r => { store.region[r.id] = { count: 0, shareholder: "ー" }; });

        // ズーム＆ドラッグ変数
        let scale = 1, posX = 0, posY = 0, isDragging = false, startX, startY;
        const mapWindow = document.getElementById('map-section-window');
        const mapInner = document.getElementById('map-container-inner');
        const svgObject = document.getElementById('external-map-object');

        window.onload = function() {
            const saved = localStorage.getItem('sankaku_external_map_data');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    if(parsed.pref) store = parsed;
                    if(parsed.currentMode) currentMode = parsed.currentMode;
                } catch(e){ console.error(e); }
            }

            // 外部SVGが完全に読み込まれたタイミングでクリックイベントを注入する
            svgObject.addEventListener('load', function() {
                setupSvgInteractions();
                setupZoomAndPan();
                switchMode(currentMode);
            });
        };

        function saveData() {
            store.currentMode = currentMode;
            localStorage.setItem('sankaku_external_map_data', JSON.stringify(store));
        }

        // ズーム・パン移動の処理
        function setupZoomAndPan() {
            mapWindow.addEventListener('wheel', function(e) {
                e.preventDefault();
                const zoomFactor = 0.1;
                if (e.deltaY < 0) { scale += zoomFactor; } else { scale -= zoomFactor; }
                scale = Math.min(Math.max(0.4, scale), 8);
                updateTransform();
            }, { passive: false });

            mapWindow.addEventListener('mousedown', function(e) {
                // 地図上の要素クリックと競合しないよう、ドラッグの開始判定を調整
                if(e.button !== 0) return;
                isDragging = true;
                startX = e.clientX - posX;
                startY = e.clientY - posY;
            });

            window.addEventListener('mousemove', function(e) {
                if (!isDragging) return;
                posX = e.clientX - startX;
                posY = e.clientY - startY;
                updateTransform();
            });

            window.addEventListener('mouseup', () => { isDragging = false; });
        }

        function updateTransform() {
            mapInner.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
        }

        function resetZoomAndPan() {
            scale = 1; posX = 0; posY = 0;
            updateTransform();
        }

        // モード変更
        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('mode-pref-btn').className = `btn ${mode==='pref'?'active':''}`;
            document.getElementById('mode-region-btn').className = `btn ${mode==='region'?'active':''}`;
            document.getElementById('list-title').textContent = mode === 'pref' ? "🗾 47都道府県スタンプラリー" : "🗾 地方広域エリアラリー";
            saveData();
            render();
        }

        // SVG内部のパス要素（都道府県）にイベントを付与する
        function setupSvgInteractions() {
            const svgDoc = svgObject.contentDocument;
            if(!svgDoc) return;

            // 一般的なSVG日本地図は path要素 で構成されているため、上から順番にIDを紐付け
            const paths = svgDoc.querySelectorAll('path');
            paths.forEach((path, index) => {
                // データの47都道府県とSVGのパスを順にマッピング (map-full.svgの構造に最適化)
                const pConfig = prefList[index];
                if (!pConfig) return;

                // 制御用のアトリビュートをパスに直接付与
                path.setAttribute('id', pConfig.id);
                path.setAttribute('data-region', pConfig.region);
                path.style.cursor = 'pointer';
                path.style.transition = 'fill 0.15s';

                // マップ左クリック
                path.addEventListener('click', function(e) {
                    e.stopPropagation();
                    handleAreaClick(pConfig.id, pConfig.region);
                });

                // マップ右クリック
                path.addEventListener('contextmenu', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    handleAreaRightClick(pConfig.id, pConfig.region, pConfig.name);
                });
            });
        }

        function handleAreaClick(prefId, regionId) {
            const dataObj = currentMode === 'pref' ? store.pref[prefId] : store.region[regionId];
            dataObj.count = (dataObj.count + 1) % 6; 
            saveData();
            render();
        }

        function handleAreaRightClick(prefId, regionId, name) {
            const dataObj = currentMode === 'pref' ? store.pref[prefId] : store.region[regionId];
            const displayTitle = currentMode === 'pref' ? name : regionList.find(r=>r.id===regionId).name;
            const newName = prompt(`「${displayTitle}」の筆頭株主名を入力:`, dataObj.shareholder);
            if (newName !== null) {
                dataObj.shareholder = newName.trim() === "" ? "ー" : newName;
                saveData();
                render();
            }
        }

        // 地図とリストの再描画
        function render() {
            const mainList = document.getElementById('main-data-list');
            const overseasList = document.getElementById('overseas-list');
            const svgDoc = svgObject.contentDocument;
            
            mainList.innerHTML = '';
            overseasList.innerHTML = '';

            // スタンプの強さに合わせたピンク色のカラーパレット
            const colors = ["#f1f5f9", "#ffe4e6", "#fecdd3", "#fda4af", "#fb7185", "#f43f5e"];

            // 1. マップのカラーリング同期
            if (svgDoc) {
                prefList.forEach(p => {
                    const path = svgDoc.getElementById(p.id);
                    if (path) {
                        const count = currentMode === 'pref' ? store.pref[p.id].count : store.region[p.region].count;
                        path.style.fill = colors[count];
                        path.style.stroke = "#64748b";
                        path.style.strokeWidth = "0.4";
                    }
                });
            }

            // 2. 右側リストの生成
            if (currentMode === 'pref') {
                prefList.forEach(p => {
                    const data = store.pref[p.id];
                    mainList.appendChild(createListRow(p.name, data, () => handleAreaClick(p.id, p.region), () => handleAreaRightClick(p.id, p.region, p.name)));
                });
            } else {
                regionList.forEach(r => {
                    const data = store.region[r.id];
                    mainList.appendChild(createListRow(r.name, data, () => handleAreaClick(null, r.id), () => handleAreaRightClick(null, r.id, null)));
                });
            }

            // 海外エリア
            store.overseas.forEach(ov => {
                const row = document.createElement('div');
                row.className = `area-item ${ov.count > 0 ? 'has-stamp' : ''}`;
                row.innerHTML = `<div><div class="area-name-text">${ov.name}</div><div class="shareholder-text">株主: ${ov.shareholder}</div></div><div class="stamp-badges">${ov.count > 0 ? "🔺".repeat(ov.count) : "未出発"}</div>`;
                row.onclick = () => { ov.count = (ov.count + 1) % 6; saveData(); render(); };
                row.oncontextmenu = (e) => {
                    e.preventDefault();
                    const n = prompt(`「${ov.name}」の筆頭株主名:`, ov.shareholder);
                    if(n !== null){ ov.shareholder = n.trim()===""?"ー":n; saveData(); render(); }
                };
                overseasList.appendChild(row);
            });
        }

        function createListRow(name, data, clickFn, rightClickFn) {
            const row = document.createElement('div');
            row.className = `area-item ${data.count > 0 ? 'has-stamp' : ''}`;
            row.innerHTML = `<div><div class="area-name-text">${name}</div><div class="shareholder-text">株主: ${data.shareholder}</div></div><div class="stamp-badges">${data.count > 0 ? "🔺".repeat(data.count) : "未出発"}</div>`;
            row.onclick = clickFn;
            row.oncontextmenu = (e) => { e.preventDefault(); rightClickFn(); };
            return row;
        }

        function addOverseasArea() {
            const name = prompt("海外・特別エリア名を入力してください（例: タイエリア）:");
            if (name && name.trim() !== "") {
                store.overseas.push({ id: "custom_" + Date.now(), name: name.trim(), count: 0, shareholder: "ー" });
                saveData(); render();
            }
        }

        function resetMapData() {
            if (confirm("本当に【全モードのデータ】を初期化しますか？")) {
                localStorage.removeItem('sankaku_external_map_data');
                prefList.forEach(p => { store.pref[p.id] = { count: 0, shareholder: "ー" }; });
                regionList.forEach(r => { store.region[r.id] = { count: 0, shareholder: "ー" }; });
                store.overseas = [{ id: "vietnam", name: "ベトナムエリア", count: 0, shareholder: "ー" }];
                resetZoomAndPan(); switchMode("pref");
            }
        }

        function downloadMapImage() {
            resetZoomAndPan();
            alert("画像生成を開始します。しばらくそのままでお待ちください。");
            setTimeout(() => {
                const target = document.getElementById('broadcast-area');
                html2canvas(target, { 
                    backgroundColor: '#ffffff', 
                    scale: 2,
                    useCORS: true // 外部SVGのキャプチャを許可
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `さんかくツアー_確定進捗_${new Date().toISOString().slice(0,10)}.png`;
                    link.href = canvas.toDataURL(); link.click();
                });
            }, 500);
        }
    </script>
</body>
</html>
