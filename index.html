<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>世界さんかく鉄道 ＆ 全国制覇オタ活マップ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --color-unmarked: #EEEEEE; /* 未達成（Geolonia仕様の薄いグレー） */
            --color-stamp-bg: #fff1f2;  
            --color-primary: #ff4d94;   
            --border-color: #cbd5e1;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-bottom: 5px;
            font-size: 26px;
            color: var(--color-primary);
            font-weight: bold;
        }

        .subtitle {
            font-size: 14px;
            margin-bottom: 20px;
            color: #64748b;
        }

        #broadcast-area {
            background-color: #ffffff;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 1250px;
            max-width: 100%;
            box-sizing: border-box;
            border: 2px solid #e2e8f0;
            display: flex;
            gap: 25px;
        }

        /* 左側：リアル日本地図表示コンテナ */
        .map-section {
            flex: 1.4;
            height: 650px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            background: #ffffff;
            position: relative;
            overflow: hidden;
            cursor: grab;
        }
        .map-section:active {
            cursor: grabbing;
        }

        /* JSで読み込んだSVGが丸ごと入るコンテナ */
        #map-container-inner {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: 0 0; /* マウス中心ズームのための起点リセット */
        }

        /* 読み込まれたGeolonia製SVGの直接制御 */
        #map-container-inner svg {
            width: 100%;
            height: 100%;
        }

        /* 右側：データ管理・パレットエリア */
        .info-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            height: 650px;
        }

        .section-container {
            display: flex;
            flex-direction: column;
            height: 45%;
        }
        .section-container.short { height: 25%; }
        .section-container.palette-box { height: 30%; }

        .section-title {
            font-size: 14px;
            color: #475569;
            margin: 0 0 8px 0;
            border-bottom: 2px solid var(--color-primary);
            padding-bottom: 4px;
            font-weight: bold;
        }

        .scroll-list {
            overflow-y: auto;
            flex: 1;
            padding-right: 5px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .area-item {
            background: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 6px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
            transition: all 0.15s;
        }
        .area-item:hover { border-color: #94a3b8; }

        .area-name-text { font-weight: bold; font-size: 13px; }
        .shareholder-text { font-size: 11px; color: #64748b; margin-top: 1px;}

        .stamp-badges {
            display: flex;
            gap: 2px;
            color: var(--color-primary);
            font-size: 12px;
        }

        /* 🎨 カラーパレットシステム */
        .palette-wrapper {
            background: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .current-color-bar {
            height: 24px;
            border-radius: 4px;
            border: 1px solid #94a3b8;
            background-color: #0000ff; 
            transition: background-color 0.15s;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
        }

        .color-cell {
            aspect-ratio: 1.5;
            border-radius: 4px;
            border: 1px solid #cbd5e1;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .color-cell:hover {
            transform: scale(1.08);
            border-color: #475569;
        }
        .color-cell.selected {
            border: 2px solid #000000;
            box-shadow: 0 0 4px rgba(0,0,0,0.3);
        }

        .control-panel {
            margin-top: 25px;
            background-color: #ffffff;
            padding: 20px;
            border-radius: 12px;
            width: 1250px;
            max-width: 100%;
            box-sizing: border-box;
            border: 1px solid #e2e8f0;
        }

        .mode-selector {
            margin-bottom: 15px;
            background: #f1f5f9;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn {
            background-color: #64748b;
            color: white;
            border: none;
            padding: 10px 18px;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 5px;
            font-weight: bold;
        }
        .btn:hover { background-color: #475569; }
        .btn.active { background-color: var(--color-primary); }
        .btn-paint { background-color: #059669; }
        .btn-paint:hover { background-color: #047857; }
        .btn-primary { background-color: #2563eb; }
        .btn-primary:hover { background-color: #1d4ed8; }
        .btn-danger { background-color: #ef4444; }

        .hint { font-size: 12px; color: #64748b; margin-top: 10px; margin-bottom: 0; }
    </style>
</head>
<body>

    <h1>世界さんかく鉄道 ＆ 全国制覇オタ活マップ</h1>
    <div class="subtitle">【操作】マウスカーソルの位置でスクロール：拡大縮小 / ドラッグ：移動 | パネルからモードを切り替えて操作できます</div>

    <div id="broadcast-area">
        <div class="map-section" id="map-section-window">
            <div id="map-container-inner">
                </div>
        </div>

        <div class="info-section">
            <div class="section-container">
                <h3 class="section-title" id="list-title">🗾 スタンプラリー状況</h3>
                <div class="scroll-list" id="main-data-list">
                    </div>
            </div>

            <div class="section-container short">
                <h3 class="section-title">✈️ 海外・特別運行エリア</h3>
                <div class="scroll-list" id="overseas-list">
                    </div>
            </div>

            <div class="section-container palette-box">
                <h3 class="section-title">🎨 カラーパレット（自由色塗りモード用）</h3>
                <div class="palette-wrapper">
                    <div class="current-color-bar" id="color-preview"></div>
                    <div class="color-grid" id="color-palette-grid">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <div class="control-panel">
        <h3 style="margin:0 0 10px 0; color:var(--color-primary); font-size:16px;">🛠️ 配信用管理パネル</h3>
        
        <div class="mode-selector">
            <strong>【現在のモード】: </strong>
            <button class="btn active" id="mode-pref-btn" onclick="switchMode('pref')">47都道府県スタンプ</button>
            <button class="btn" id="mode-region-btn" onclick="switchMode('region')">地方(9エリア)スタンプ</button>
            <button class="btn btn-paint" id="mode-paint-btn" onclick="switchMode('paint')">🎨 自由色塗りモード</button>
        </div>

        <button class="btn btn-primary" onclick="downloadMapImage()">現在のマップを画像として保存(DL)</button>
        <button class="btn" onclick="resetZoomAndPan()">ズーム・位置をリセット</button>
        <button class="btn" onclick="addOverseasArea()">海外エリアを新規追加</button>
        <button class="btn btn-danger" onclick="resetMapData()">全データをリセット</button>
        <p class="hint">※同じフォルダ内に「map-full.svg」を配置してください。ローカルPCで動かない場合はGitHub Pagesにアップすると100%動作します。</p>
    </div>

    <script>
        // Geoloniaのdata-code属性と1対1で対応する都道府県データ
        const prefList = [
            { id: "hokkaido", code: "1", name: "北海道", region: "kyusyu-okinawa" }, // Geolonia内部の地方表記(kyusyu-okinawa)にマップ
            { id: "aomori", code: "2", name: "青森県", region: "tohoku" }, { id: "iwate", code: "3", name: "岩手県", region: "tohoku" },
            { id: "miyagi", code: "4", name: "宮城県", region: "tohoku" }, { id: "akita", code: "5", name: "秋田県", region: "tohoku" },
            { id: "yamagata", code: "6", name: "山形県", region: "tohoku" }, { id: "fukushima", code: "7", name: "福島県", region: "tohoku" },
            { id: "ibaraki", code: "8", name: "茨城県", region: "kanto" }, { id: "tochigi", code: "9", name: "栃木県", region: "kanto" },
            { id: "gunma", code: "10", name: "群馬県", region: "kanto" }, { id: "saitama", code: "11", name: "埼玉県", region: "kanto" },
            { id: "chiba", code: "12", name: "千葉県", region: "kanto" }, { id: "tokyo", code: "13", name: "東京都", region: "kanto" },
            { id: "kanagawa", code: "14", name: "神奈川県", region: "kanto" },
            { id: "niigata", code: "15", name: "新潟県", region: "chubu" }, { id: "toyama", code: "16", name: "富山県", region: "chubu" },
            { id: "ishikawa", code: "17", name: "石川県", region: "chubu" }, { id: "fukui", code: "18", name: "福井県", region: "chubu" },
            { id: "yamanashi", code: "19", name: "山梨県", region: "chubu" }, { id: "nagano", code: "20", name: "長野県", region: "chubu" },
            { id: "gifu", code: "21", name: "岐阜県", region: "chubu" }, { id: "shizuoka", code: "22", name: "静岡県", region: "chubu" },
            { id: "aichi", code: "23", name: "愛知県", region: "chubu" },
            { id: "mie", code: "24", name: "三重県", region: "kinki" }, { id: "shiga", code: "25", name: "滋賀県", region: "kinki" },
            { id: "kyoto", code: "26", name: "京都府", region: "kinki" }, { id: "osaka", code: "27", name: "大阪府", region: "kinki" },
            { id: "hyogo", code: "28", name: "兵庫県", region: "kinki" }, { id: "nara", code: "29", name: "奈良県", region: "kinki" },
            { id: "wakayama", code: "30", name: "和歌山県", region: "kinki" },
            { id: "tottori", code: "31", name: "鳥取県", region: "chugoku" }, { id: "shimane", code: "32", name: "島根県", region: "chugoku" },
            { id: "okayama", code: "33", name: "岡山県", region: "chugoku" }, { id: "hiroshima", code: "34", name: "広島県", region: "chugoku" },
            { id: "yamaguchi", code: "35", name: "山口県", region: "chugoku" },
            { id: "tokushima", code: "36", name: "徳島県", region: "shikoku" }, { id: "kagawa", code: "37", name: "香川県", region: "shikoku" },
            { id: "ehime", code: "38", name: "愛媛県", region: "shikoku" }, { id: "kochi", code: "39", name: "高知県", region: "shikoku" },
            { id: "fukuoka", code: "40", name: "福岡県", region: "kyusyu" }, { id: "saga", code: "41", name: "佐賀県", region: "kyusyu" },
            { id: "nagasaki", code: "42", name: "長崎県", region: "kyusyu" }, { id: "kumamoto", code: "43", name: "熊本県", region: "kyusyu" },
            { id: "oita", code: "44", name: "大分県", region: "kyusyu" }, { id: "miyazaki", code: "45", name: "宮崎県", region: "kyusyu" },
            { id: "kagoshima", code: "46", name: "鹿児島県", region: "kyusyu" }, { id: "okinawa", code: "47", name: "沖縄県", region: "kyusyu-okinawa" }
        ];

        // 企画書およびGeolonia内部のクラス名に合わせた地方リスト [cite: 47]
        const regionList = [
            { id: "kyusyu-okinawa", name: "北海道エリア" }, // Geolonia内部クラスに合わせてIDを配分
            { id: "tohoku", name: "東北エリア" }, { id: "kanto", name: "関東エリア" },
            { id: "chubu", name: "中部エリア" }, { id: "kinki", name: "関西(近畿)エリア" },
            { id: "chugoku", name: "中国エリア" }, { id: "shikoku", name: "四国エリア" },
            { id: "kyusyu", name: "九州エリア" }
        ];

        const paletteColors = [
            "#000000", "#808080", "#c0c0c0", "#ffffff", "#800000",
            "#ff0000", "#800080", "#ff00ff", "#008000", "#00ff00",
            "#808000", "#ffff00", "#000080", "#0000ff", "#008080"
        ];

        let currentMode = "pref"; 
        let selectedColor = "#0000ff"; 

        let store = {
            pref: {}, region: {}, paintColors: {},
            overseas: [{ id: "vietnam", name: "ベトナムエリア", count: 0, shareholder: "ー", color: "" }]
        };

        prefList.forEach(p => { store.pref[p.code] = { count: 0, shareholder: "ー" }; store.paintColors[p.code] = ""; });
        regionList.forEach(r => { store.region[r.id] = { count: 0, shareholder: "ー" }; });

        // マウス位置中心のズーム＆パン用データ
        let scale = 1, posX = 0, posY = 0, isDragging = false, startX, startY;
        const mapWindow = document.getElementById('map-section-window');
        const mapInner = document.getElementById('map-container-inner');

        window.onload = async function() {
            const saved = localStorage.getItem('sankaku_ajax_map_data');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    if(parsed.pref) store = parsed;
                    if(parsed.currentMode) currentMode = parsed.currentMode;
                    if(parsed.selectedColor) selectedColor = parsed.selectedColor;
                } catch(e){ console.error(e); }
            }
            createPaletteGrid();

            // 🟢 【重要】同じフォルダにある map-full.svg を非同期でクリーンに展開する
            try {
                const res = await fetch('./map-full.svg');
                if (res.ok) {
                    const svgText = await res.text();
                    mapInner.innerHTML = svgText;
                    
                    // Qiita記事通りのCSSプロパティ自動割当と初期化
                    const svgElement = mapInner.querySelector('svg');
                    if(svgElement) {
                        svgElement.style.width = "100%";
                        svgElement.style.height = "100%";
                    }

                    setupMapClickHandlers();
                    setupZoomAndPan();
                    switchMode(currentMode);
                } else {
                    mapInner.innerHTML = `<div style="padding:20px; color:red; font-weight:bold;">【エラー】map-full.svg が見つかりません。index.htmlと同じフォルダに配置してください。</div>`;
                    setupZoomAndPan();
                    switchMode(currentMode);
                }
            } catch (e) {
                // ローカル環境制限の対策
                mapInner.innerHTML = `<div style="padding:20px; color:#555; font-size:14px; line-height:1.6;">
                    <h3>🌐 ブラウザによる読み込み制限について</h3>
                    PC上でファイルを直接ダブルクリック（file://）すると、ブラウザのセキュリティ制限によりマップデータがロードされません。<br><br>
                    <strong>【解決方法】</strong><br>
                    GitHub Pagesにこの2つのファイルをアップロードして公開するか、VSCodeのLive Serverなどのローカルサーバー機能で開くと、100%完全に動作します。
                </div>`;
                setupZoomAndPan();
                switchMode(currentMode);
            }
        };

        function saveData() {
            store.currentMode = currentMode;
            store.selectedColor = selectedColor;
            localStorage.setItem('sankaku_ajax_map_data', JSON.stringify(store));
        }

        function createPaletteGrid() {
            const grid = document.getElementById('color-palette-grid');
            const preview = document.getElementById('color-preview');
            preview.style.backgroundColor = selectedColor;

            paletteColors.forEach(color => {
                const cell = document.createElement('div');
                cell.className = 'color-cell';
                cell.style.backgroundColor = color;
                if(color === selectedColor) cell.classList.add('selected');

                cell.onclick = () => {
                    document.querySelectorAll('.color-cell').forEach(c => c.classList.remove('selected'));
                    cell.classList.add('selected');
                    selectedColor = color;
                    preview.style.backgroundColor = color;
                    saveData();
                };
                grid.appendChild(cell);
            });
        }

        // 🎯 マウスカーソルの置かれた位置を起点にして正確に縮小拡大する数学ロジック
        function setupZoomAndPan() {
            mapWindow.addEventListener('wheel', function(e) {
                e.preventDefault();
                
                const zoomFactor = 0.15;
                const rect = mapWindow.getBoundingClientRect();
                
                // マウスのコンテナ内ローカル座標
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;

                // 現在のズーム前の、SVG上の絶対位置を逆算
                const svgX = (mouseX - posX) / scale;
                const svgY = (mouseY - posY) / scale;

                // 新しいスケール計算
                if (e.deltaY < 0) { scale += zoomFactor; } else { scale -= zoomFactor; }
                scale = Math.min(Math.max(0.4, scale), 8);

                // マウス位置がズーム前後でズレないように新しい移動距離(posX, posY)を計算
                posX = mouseX - svgX * scale;
                posY = mouseY - svgY * scale;

                updateTransform();
            }, { passive: false });

            mapWindow.addEventListener('mousedown', function(e) {
                if(e.button !== 0) return;
                isDragging = true;
                startX = e.clientX - posX;
                startY = e.clientY - posY;
            });

            window.addEventListener('mousemove', function(e) {
                if (!isDragging) return;
                posX = e.clientX - startX;
                posY = e.clientY - startY;
                updateTransform();
            });

            window.addEventListener('mouseup', () => { isDragging = false; });
        }

        function updateTransform() {
            mapInner.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
        }

        function resetZoomAndPan() {
            scale = 1; posX = 0; posY = 0;
            updateTransform();
        }

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('mode-pref-btn').className = `btn ${mode==='pref'?'active':''}`;
            document.getElementById('mode-region-btn').className = `btn ${mode==='region'?'active':''}`;
            document.getElementById('mode-paint-btn').className = `btn btn-paint ${mode==='paint'?'active':''}`;
            
            const titleEl = document.getElementById('list-title');
            if(mode === 'pref') titleEl.textContent = "🗾 47都道府県スタンプラリー";
            if(mode === 'region') titleEl.textContent = "🗾 地方広域エリアラリー";
            if(mode === 'paint') titleEl.textContent = "🎨 都道府県リスト (自由塗りつぶし中)";
            
            saveData();
            render();
        }

        // Geoloniaの構造に最適化した正確なイベントインジェクター
        function setupMapClickHandlers() {
            const prefs = mapInner.querySelectorAll('.prefecture');
            if(!prefs.length) return;

            prefs.forEach(prefGroup => {
                const code = prefGroup.getAttribute('data-code');
                // class属性から地方用クラスを特定するためのロジック
                const classes = Array.from(prefGroup.classList);
                const regionId = classes.find(c => regionList.some(r => r.id === c)) || "";

                prefGroup.style.cursor = 'pointer';

                // 左クリックイベント
                prefGroup.onclick = (e) => {
                    e.stopPropagation();
                    handleAreaClick(code, regionId);
                };

                // 右クリックイベント（株主入力）
                prefGroup.oncontextmenu = (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    const pConfig = prefList.find(p => p.code === code);
                    handleAreaRightClick(code, regionId, pConfig ? pConfig.name : "不明な県");
                };
            });
        }

        function handleAreaClick(code, regionId) {
            if (currentMode === 'paint') {
                store.paintColors[code] = store.paintColors[code] === selectedColor ? "" : selectedColor;
            } else if (currentMode === 'pref') {
                store.pref[code].count = (store.pref[code].count + 1) % 6;
            } else if (currentMode === 'region') {
                const targetState = (store.region[regionId].count + 1) % 6;
                store.region[regionId].count = targetState;
            }
            saveData();
            render();
        }

        function handleAreaRightClick(code, regionId, name) {
            const dataObj = (currentMode === 'region') ? store.region[regionId] : store.pref[code];
            const displayTitle = (currentMode === 'region') ? regionList.find(r=>r.id===regionId).name : name;
            const newName = prompt(`「${displayTitle}」の筆頭株主名を入力してください:`, dataObj.shareholder);
            if (newName !== null) {
                dataObj.shareholder = newName.trim() === "" ? "ー" : newName;
                saveData();
                render();
            }
        }

        function render() {
            const mainList = document.getElementById('main-data-list');
            const overseasList = document.getElementById('overseas-list');
            
            mainList.innerHTML = '';
            overseasList.innerHTML = '';

            const stampColors = ["#EEEEEE", "#ffe4e6", "#fecdd3", "#fda4af", "#fb7185", "#f43f5e"];

            // 1. 地図側のリアルタイムカラーリング反映
            prefList.forEach(p => {
                const prefElement = mapInner.querySelector(`[data-code="${p.code}"]`);
                if (prefElement) {
                    let fillHex = "#EEEEEE";
                    if (currentMode === 'paint') {
                        fillHex = store.paintColors[p.code] || "#EEEEEE";
                    } else if (currentMode === 'pref') {
                        fillHex = stampColors[store.pref[p.code].count];
                    } else if (currentMode === 'region') {
                        fillHex = stampColors[store.region[p.region].count];
                    }

                    // グループ内の polygon や path すべてを着色
                    const paths = prefElement.querySelectorAll('polygon, path');
                    paths.forEach(el => el.style.fill = fillHex);
                }
            });

            // 2. 右側データリストの生成
            if (currentMode === 'pref' || currentMode === 'paint') {
                prefList.forEach(p => {
                    const data = store.pref[p.code];
                    const row = createListRow(p.name, data, () => handleAreaClick(p.code, p.region), () => handleAreaRightClick(p.code, p.region, p.name));
                    if (currentMode === 'paint' && store.paintColors[p.code]) {
                        row.style.borderLeft = `5px solid ${store.paintColors[p.code]}`;
                    }
                    mainList.appendChild(row);
                });
            } else {
                regionList.forEach(r => {
                    const data = store.region[r.id];
                    mainList.appendChild(createListRow(r.name, data, () => handleAreaClick(null, r.id), () => handleAreaRightClick(null, r.id, null)));
                });
            }

            // 3. 海外エリアリストの生成
            store.overseas.forEach(ov => {
                const row = document.createElement('div');
                row.className = `area-item`;
                if(ov.count > 0 && currentMode !== 'paint') row.style.backgroundColor = "var(--color-stamp-bg)";
                if(ov.color) row.style.borderLeft = `5px solid ${ov.color}`;

                row.innerHTML = `<div><div class="area-name-text">${ov.name}</div><div class="shareholder-text">株主: ${ov.shareholder}</div></div><div class="stamp-badges">${(ov.count > 0 && currentMode !== 'paint') ? "🔺".repeat(ov.count) : ""}</div>`;
                
                row.onclick = () => {
                    if (currentMode === 'paint') {
                        ov.color = ov.color === selectedColor ? "" : selectedColor;
                    } else {
                        ov.count = (ov.count + 1) % 6;
                    }
                    saveData(); render();
                };
                row.oncontextmenu = (e) => {
                    e.preventDefault();
                    const n = prompt(`「${ov.name}」の筆頭株主名:`, ov.shareholder);
                    if(n !== null){ ov.shareholder = n.trim()===""?"ー":n; saveData(); render(); }
                };
                overseasList.appendChild(row);
            });
        }

        function createListRow(name, data, clickFn, rightClickFn) {
            const row = document.createElement('div');
            row.className = `area-item`;
            if (data.count > 0 && currentMode !== 'paint') row.style.backgroundColor = "var(--color-stamp-bg)";
            
            row.innerHTML = `<div><div class="area-name-text">${name}</div><div class="shareholder-text">株主: ${data.shareholder}</div></div><div class="stamp-badges">${(data.count > 0 && currentMode !== 'paint') ? "🔺".repeat(data.count) : ""}</div>`;
            row.onclick = clickFn;
            row.oncontextmenu = (e) => { e.preventDefault(); rightClickFn(); };
            return row;
        }

        function addOverseasArea() {
            const name = prompt("海外・特別エリア名を入力してください（例: タイエリア）:");
            if (name && name.trim() !== "") {
                store.overseas.push({ id: "custom_" + Date.now(), name: name.trim(), count: 0, shareholder: "ー", color: "" });
                saveData(); render();
            }
        }

        function resetMapData() {
            if (confirm("本当に【全モードのデータ】を初期化しますか？")) {
                localStorage.removeItem('sankaku_ajax_map_data');
                prefList.forEach(p => { store.pref[p.code] = { count: 0, shareholder: "ー" }; store.paintColors[p.code] = ""; });
                regionList.forEach(r => { store.region[r.id] = { count: 0, shareholder: "ー" }; });
                store.overseas = [{ id: "vietnam", name: "ベトナムエリア", count: 0, shareholder: "ー", color: "" }];
                resetZoomAndPan(); switchMode("pref");
            }
        }

        function downloadMapImage() {
            resetZoomAndPan();
            alert("進捗画像を生成します。少々お待ちください。");
            setTimeout(() => {
                const target = document.getElementById('broadcast-area');
                html2canvas(target, { backgroundColor: '#ffffff', scale: 2 }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `さんかく鉄道_配信進捗_${new Date().toISOString().slice(0,10)}.png`;
                    link.href = canvas.toDataURL(); link.click();
                });
            }, 500);
        }
    </script>
</body>
</html>
